body:
  text: 卷一醫學望謂觀其氣之盛衰色之深淺也聞謂聽其聲之重輕以徵氣之強弱之也問謂詢其情之苦欲病之相因也脈即診脈也謂診其脈之陰陽合乎形色也經曰上工望而知之有諸內必形諸外也中工問而知之下工脈而知之也好問則裕好謀而成者也袁大宣先生云病猶寇也藥猶兵也醫猶將也用藥以驅病即用兵以逐寇是在為將者運用何如耳不必株守夫常格拘滯乎成見棄取不必隨人輕重總歸自忖用藥必獲一藥之效而變通之以盡其致立一方必合群藥之力而參互之以奏厥功苟非藥性嫺熟而深究其微又鳥能變化隨心哉業患不能精行成於思也形質論張石頭先生肌之滑澀徵津液之盛衰也事之疏密微營衛之弱強也肉之耎堅徵胃氣之虛實也筋之枯澤徵肝血之充餒也骨之大小徵腎氣之勇怯也瓜之剛柔徵膽液之淳清也指之肥瘦徵經氣之榮枯也掌之厚薄徵氣之豐歉也皮之寒熱徵里之陰陽也皮膚熱甚脈盛躁者溫病也其脈盛而滑者病且出也皮膚寒其脈小者或泄而少氣也神色論面色青黑黯慘無論病之新久終屬陽氣不振也黃色現於面目而不索澤者病向愈之候也眼胞上下如煙煤者寒痰也眼黑頰赤者熱痰也眼黑而行步艱難呻吟者痰飲入骨也眼黑而面帶土色四肢痿痹屈伸不便者風痰也病人見黃色光澤者為有胃氣不死也病人面色干黃者為津液枯稿多凶也目睛黃者非疸即衄也目黃大煩為病進也平人口鼻耳目黑氣現者危也赤色見於兩顴黑氣現於神庭乃大氣人於心腎暴亡之兆也聲氣論病劇而聲音清朗如常者形病氣不病也初病即氣壅聲濁者邪干清道也病未久而語聲不續者其人中氣本虛也言遲者風也行遲者表強也多言者火之用事也聲如從室中言者中氣之濕也言而微終日乃復言者正氣之奪也衣被不敝言語善惡不避親疏者神明之亂也出言嫩怯先重後輕者內傷元氣也出言壯厲光輕後重者外感客邪也攢眉呻吟者頭痛也噫於介切氣以手撫心者中脘痛也搖頭以手捫腮者齒頰痛也呻吟不能轉身坐而下一腳者腰痛也坐而伏者短氣也呻吟不能行步者腰腳痛也診時吁氣者鬱結也搖頭言者里痛也護腹知懷卵者心痛也形羸聲啞者勞療咽中有肺花瘡也暴啞者此風痰伏火或怒喊哀號所致也語言蹇澀者風痰也診時獨言獨語不知首尾者思慮傷神也診時呻者痛也欠者無病也傷寒壞病唇口有瘡者狐惑也平人無寒熱短氣不足以息者痰火也看診訣程鍾齡先生日鼻氣粗疾出疾入者外感也邪氣有餘鼻氣微徐出徐入者內傷也正氣不足發熱而靜默者邪在表也發熱而動躁者邪者里也里證有陰陽之異喜向內睡者陰也喜向外睡者陽也喜仰面臥者多熱也喜覆身臥者多寒也喜伸腳睡者為熱喜踡腳睡者為寒也病人衣被全覆手腳不露者身必惡寒也非表證即直中證矣病人揚手露腳者身必惡熱邪入府也衣被全覆昏昏而睡者真熱假寒陽極似陰也假渴煩躁欲坐臥泥水中者真寒假熱陰極似陽也闕庭光澤傷於風也闕庭暗晦傷於寒也黃色明潤者吉黑色枯稿者凶面色青黑者為寒為直中陰證也面色紫赤者為熱為傳經里證也若已發汗後面赤色盛此表邪出不徹也當重表之閣面赤色者乃陰盛格陽是為戴陽之候也宜急溫之以通陽氣不可誤作熱證治也面色黃者雖惡證尚可療也黃欲如羅里雄黃忌如黃土色赤白者次之赤欲如帛里朱忌如赭色白欲如鵝羽忌如鹽色也青黑者凶多吉少矣青欲如蒼璧之澤忌如藍色黑欲如重漆之光忌地蒼色一五色須以明潤為主不宜枯稿然五色精華盡現者其壽亦不能久也鼻頭即明堂也色青者腹中痛也色微黑者痰飲也色黃者濕熱也色白者氣虛也色赤者肺熱也傷寒鼻孔乾燥者乃邪熱在陽明肌肉之中久之必衄血也病人欲嚏而不能者塞也鼻塞流濁涕者風熱也鼻塞流清涕者風寒也病人睡而鼾者臥而有鼻息也風溫也鼻孔乾燥黑如煙煤者陽毒熱甚也鼻孔出冷氣滑而黑者陰毒冷極孤鼻孔張者為肺氣將絶也産婦昂起黑氣或鼻鈕者為胃敗肺絶之危候也古方用嘰參蘇飲加附子救之多有得生者唇乾而焦者邪在肌肉也焦而紅者病易愈也漾而黑者為難治也赤而腫者肌肉熱甚也色青黑者冷極也上唇有瘡蟲食其臟也為之狐證下唇有瘡蟲食其肛也為之惑證病中若見唇卷唇青唇黑唇顫者皆死證也頻進參附或百中一生也日苦者膽熱也口甜者脾熱也日酸者肝熱也日辛者肺熱也日蛾者腎熱也日淡者胃熱也口滴者肝邪逆於肺也日燥咽乾而渴者熱邪褥入腎經真水不能上往於華池也一須急下之以救腎家將澗之水日不煥咽不乾頻欲飲熱湯者腎氣虛寒也一小灑之色必自日尿赤者邪入膀胱濕熱相聚也自汁脈浮者宜滲利之無汗脈緊者忌滲利也口噤難言者或為痙病頭搖口噤背反張者太陽化口噤胸滿臥不著席腳攣急大便閉結不通必齘齒胃腑之實熱也或為寒中猝然口鼻氣冷手足厥冷或腹痛下利清穀或身體強硬四肢戰搖或為痰迷心竅六脈沈細痰壅喉響各不相等也環口黧黑口張氣直或如魚口或乍出不返皆難治也耳輪紅潤者病易愈也耳輪枯稿者凶多吉少也耳輪薄而白薄而黑薄而青或焦如炭色者皆為腎敗死期近也耳聾及耳中痛者乃邪在半表半裡屬於少陽和解之可已也耳聾而兼舌搖唇青者死證也目開欲見人者陽證也病而如常瞭然者邪未傳裡也目赤目黃者邪已入里也目閉不欲見人者陰證也目昏暗不明者邪熱在內消灼腎水也腎水枯竭故目不明宜急用大承氣湯下之蓋寒則目清未有寒甚而目不見者目瞑翕目也者將衄血也目睛黃者濕熱壅遏所致將發黃疸也黃有濕熱寒濕之別色如橘子柏皮因火氣而光彩此名陽黃濕熱也色暗而不明或手足厥冷脈沈細此名陰黃乃寒濕也目反上視橫目斜視瞪目直視及眼胞忽然陷下者乃五臟絶也雜病忽然雙目不明者此氣虛而脫也用人參膏生之脫臉目瞀者此血脫也邪熱則下之虛則補之然此已危險之極也舌黑津潤不破裂乾燥者直中寒證也舌津液如常邪在表而未傳裡也舌胎白而滑者邪在少陽半表半裡舌胎黃而乾燥者邪已入里也胃熱甚宜下之舌胎黑而有芒刺破裂乾枯者邪熱盛極也腎水枯涸至重之候應急下之寒證舌黑者本色也溫之即瘥熱證反赤為黃反黃為黑者乃熱極反兼水化至卮之候也舌腫脹或重舌或木舌或舌胎黃而生芒刺皆熱甚也至若舌鞭舌強舌短縮舌卷神氣昏亂語言不清者皆危險之極也陰陽易病舌脹大出口外者危惡甚也用紙捻蘸芘麻油燒煙燻之可收然病愈不易易也張誕先先生傷寒舌鑑一百二十圖甚為明瞭宜細玩也身輕自能轉動者病易愈也身體沈重轉側須人者病深也身重須以兼證辨之不可以概論也加骨節煩疼不嘔不渴脈虛浮而澀不能自轉側者此表寒風濕相搏也宜桂附湯如四肢沈重疼痛腹痛下利不能自轉側者此裡寒少陰病也宜真武湯發汗已身猶灼熱脈浮汗出多眠鼻鼾不能自轉側者此表寒束其裡熱風溫也宜萎蕤湯腹滿面垢口不仁自汗出譫語遺尿不能自轉側者此表裡皆熱三陽合病也宜白虎湯少腹裡急少氣氣上衝胸眼中生花不能自側轉者此裡虛且寒陰陽易病也附子理中湯身重厥冷蜷臥無熟惡寒閉目不欲嚮明不欲見人者陰證也身痛如被杖身重如山而不能轉側者陰毒也手足抽搐角弓反張者痙也痙有三陽經絡之殊有胃腑實熱所致有三陰中寒所發有內傷氣血虛弱而發宜辨別按證而施治也身痛如繩束者太陽表證也頭重視身者天柱骨倒而元氣敗也頭搖不止髮直如妝及頭上攛者皆絶證也頭痛連腦及項脊者太陽表證也頭痛連額及面目者陽明證也頭痛連耳前後並額角者少陽證也頭痛而口渴便閉尿赤短數者陽明腑熱熏蒸也頭痛惡寒發熱者外感風寒也三陰本無頭痛其有之者必直中而兼外感也至厥陰頭痛脈浮者乃傷寒傳經至此而然是里邪欲達於表宜微汗之也頭痛筋脈抽搐或鼻流濁涕而塞者風寒也宜清空膏頭痛連眼角畫輕夜重者血虛也宜逍遙散頭痛而起核塊或頭中嗚者雷頭風也多屬痰火宜清震湯頭痛連腦及齒手足厥冷口鼻氣冷者客寒犯腦也宜羌活附子湯頭痛日渴欽冷頭筋扛起脈洪大者胃火上衝也宜加味升麻湯頭痛胸膈煩滿動則眩最者痰厥也宜半夏白朮天痂湯頭痛而重足浮腰痠膝耎者腎厥也腎有真水真火須分別之水虛者脈必數而無力宜用六味丸火虛者脈必大而無力宜用八昧丸頭腫大甚如斗者乃火鬱也即大頭天行也其感之輕者則腫在耳前後名日發頤宜用普濟消毒飲頭痛手足青至節者乃陽氣大虛腦受邪侵真頭痛也證甚危險速用補中益氣湯加川芎附子蔓荊於兼進八味丸或有得生者不可輕忽也破腦傷風者風從破處而入其證多發搐搦也宜防風散眉稜骨痛或眼眶痛者肝經病也血虛者見光則痛宜逍遙散風熱者痛不可開宜清空膏胸痛者邪氣初傳人里而未深入也宜用柴胡湯加枳殼或本方對小陷胸湯胸痛滿而氣喘者風寒在肺也宜甘桔湯加理氣散風藥傷寒胸不痛滿者邪氣在表也胸痛脹滿未經下過者半表半裡之證也若已下過而痛甚者恐成結胸也邪之傳與不傳以此可消息矣尋常胸中脹滿多由飲食填塞吐之即已也腹痛乍作乍止脈洪有力者熱也芍藥甘草湯加黃連如腹痛噯腐吞酸飽悶膨脹腹中有一條扛起者食積也宜保和丸消之而痛不止便閉不行而拒按者宜三黃枳朮丸下之下後以手按仍痛者積未盡也仍用平藥以再消之消導攻下之後遂至惡冷喜熱者漸變寒中也須易溫中之劑腹痛綿綿不巳脈遲無力者寒也宜香砂理中湯如腹痛咖兼飽悶脹病是有食櫝不便驟補宜用香砂二陳湯加薑桂查朴穀芽溫而消之消之而痛不止大便反閉名曰陰結宜木香丸熱藥下之下後仍用溫劑和之可也腹痛走注無定者濁氣壅塞也宜木香調氣散腹痛騃板不移者瘀血積聚也宜澤蘭湯行之腹痛而唇有斑點飢時更甚者蟲齒也用化蟲丸腹痛而吐瀉者傷暑霍亂也宜四味香需飲腹痛欲吐不得吐欲瀉不得瀉變在須失者乾霍亂也俗名曰攪腸沙更有偏體紫黑者鳥沙鵬也此二證勢極凶險刻不可待急用刀頭燒鹽和陰陽水吐之或用四陳湯服之外用武侯平安散點左右大眼角蔗幾十中生一也腹痛當臍中轉側作水聲小便如淋者腹內癰也宜用牡丹皮散傷寒以手按腹若不痛脹者邪夫人里也按之而腹滿痛嗌乾口燥脈沈實者少陽之邪傳入太陰經肝木乘脾也宜小柴胡湯去參加芍藥和之和之而腹脹不減痛不止者裡實之證也宜大樂胡湯下之如自利去大黃易黃連太陽證為醫誤下因而腹滿痛者此內陷之邪也宜用桂枝倍芍藥其大實痛者宜加大黃若腹脹時滅痛則綿綿者此里證未實但可清之不可攻也至直中腹痛則不由陽經傳來其證必腹滿而吐食不下自利氣冷脈必沈遲也宜理中湯小腹硬痛者傷寒邪熱傳至厥陰經也濁陰凝聚宜急下之小腹硬痛而小便自利大便黑色者蓄血證也宜桃仁承氣湯攻之小腹脹滿而小便不通大便如常者膀胱蓄水也口渴者熱在上焦氣分也宜四苓散加梔芩不渴者熱在下焦血分也宜滋腎丸滋化原小腹繞臍硬痛小便數而短赤者燥糞證也宜大承氣湯以下之小腹冷痛小便清長者寒邪直中厥陰也宜急溫之直中證舌雖短總而潤澤傳邪證舌必焦燥津枯寒熱天淵也尋常小腹痛者多屬疝瘕奔豚痃癖症積帶下也三陰急為疝三陽急為瘕冷氣上衝為奔豚筋扛起如弓較為痃嗜好積聚不化成形為癖瘀血凝滯成塊不動作痛為症女子帶下皆由脾虛感濕也手指尖冷者寒也手指尖溫者風也指甲紫色者熱極也指甲白色者血虧也指甲黑而青者毒甚中之也手心熱者風邪也小便白而多者寒也小便黃而少者熱也小便赤者熱極也小便點滴不通者閉也渴者熱上焦氣分也不渴者在下焦血分小便不禁者脬氣不固也肝氣熱則陰挺失職宜逍遙散中氣虛則不能統攝宜十補湯小便自遺者腎敗也急用附子理中湯頻灌之或可救得十中之一二大便不通燥渴譫語者陽明胃熱實閉也宜用小承氣湯老人精血不足産婦氣血兩虛以致大便不潤者虛閉也血不足用四物湯加潤藥氣虛血兩虧則宜用八珍湯大便不通口燥唇焦舌胎黃小便赤喜冷惡熱者陽結也宜三黃枳朮丸大便不通唇淡口和舌胎白小便清喜熱惡冷者陰結也宜用理中湯加歸芍陽結者脈浮而數能食十七日當劇陰結者脈沈而遲不能食身體重十四日當劇劇者裡急下重且滿且痛不可再待時日宜早圖而下之凡病後津液傷甚者多見此證也大便前出小便後出者交腸證也宜五苓散大便小便俱由前出者乃血液枯涸氣血衰敗也多服大劑八珍湯或可稍延歲月耳不治之證也大便溏者受寒也大便欲解不解者血少也大便不實口渴尿赤下瀉腹垢者濕熱也神朮散加速翹大便不實下瀉清穀者濕寒也神朮散加炮薑木香其證必尿清而口和大便不實胸滿痞悶噯腐吞酸瀉下臭穢者食積也神朮散加楂牙神麯治瀉須利小便點必食積既消方可利之不宜草率大便不實食少瀉頻面色皎白者脾虛也宜用香砂六君子湯兼寒者加薑桂附子大便不實五更天明依時而泄者腎虛也宜加味七神丸凡病中循衣摸床兩手撮空者此神去而魂亂也至於大肉盡脫九侯雖調終亦必亡也
