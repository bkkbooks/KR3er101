body:
  text: 卷二診脈訣沈云將先生脈分三部有左有右上部曰寸為陽長六分始自魚際即大指下節與小臀骨相交處也中部曰關為半陽半陰長六分居小高骨之內其前三分通乎寸為陽敵陽數九也後三分通乎尺為陰故陰數十也所謂半陽半陰由是故耳下部曰尺為陰長七分居於關之後統攝三部者曰寸口左為人迎右為氣口部各三候曰浮主皮膚以候表曰中主肌肉以候胃氣也曰沈主筋骨以候里所謂三部九候者指一手而言也長人脈長疏排指取短人脈短密排指取老人脈耎浮取肥人脈細重取小兄脈緩瘦人脈大皆宜輕取至於反開脈開脈三部俱在臂側魚際脈在寸口之上大小脈兩手不同六陰脈皆沈六陽脈皆浮其有兩手清微無脈者乃貴重之人更有六脈平和者非仙即怪必須細心推究不可概論也人之體躬有陰有陽陰曰營統血而行脈中寒則瘍營陽日衛統氣而行脈外風則傷衛脈之至數定於呼吸呼者氣之出脈之來也吸者氣之入脈之去也呼一吸為之息一息而脈四動閏以太息故五動亦為和無疾病者也三動為遲陽氣衰也二動為敗陽氣衰甚也一息一動危殆極矣六動為數陰氣衰也七動為極陰氣衰甚也八動為脫氣血兩虧也九動為死矣遲敗數極四者其脈中候有力則為有神沈候有力則為有根而兩尺之沈候又為根中之根他脈訣云寸關雖無尺猶未絕如此之流何憂殞滅洵非虛語儻根蒂已壞節逢長桑君亦無所施伎矣至於一息而脈十動以外與夫兩息而脈一動者此則散而為變也遲敗二者寒也數極二者熱也一脈分來氣之出也陽也自骨肉之分而上於皮膚之際乃氣之升故以候表去氣之入也陰也自皮膚之際而下於筋骨之閒乃氣之降故以候里疾氣有餘也遲氣不足也反病在裡也覆病在表也以徵內外虛實表裡盛衰也來疾去遲內虛外實也來遲去疾內實外虛也來小去大為之反病在裡陰盛也來大去小為之覆病在表陽盛也寸口通指寸關尺而言也之管衛所以則脈之盛衰候人之強弱也衛主氣為陽以候表脈隨指有力衛氣盛也調之高高者長也脈隨指無力衛氣弱也謂之惵惵者恍惚也衛氣和平曰緩緩者胃氣有餘也胃氣有餘則顏色聲音毛髮鮮澤矣螢主血為陰以候里脈隨指有力營血盛也謂之章章者明也脈隨指無力營血弱也謂之卑卑者縮下也營血和平曰遲遲者脾陰充足也脾陰充足則骨髓肌肉豐滿堅固矣營衛兩盛謂之綱有餘總攪之意也營衛不足謂之捐有消縮之意也營衛剛柔相得和緩之脈同見則謂之強強者即顏色之鮮麗而血肉豐盈其人之壯健可知也浮中沈三候分主皮脈肉筋骨以應五臟之診法也肺浮主於皮毛心浮主於血脈脾在浮沈之間而主乎肌肉故以候中肝沈主於筋力腎沈主於骨隨也下指有輕重差等以侯五藏之氣也與皮毛相得者肺也下指宜如三豆重以候之與血脈相得者心也下指宜如六豆重以候之與肌肉相等者脾也宜如九豆重以候之與筋相平者肝也宜如十二豆重以候之按之至骨舉之來疾者腎也各隨所主之部以候藏氣也豆之調者約略輕重而譬之不必拘執以為繩尺也至於左右兩手亦各有寸關尺所主分位須應照此三候取之以分表裡也寸口脈通指三部言也有浮沈遲數以候表裡藏府之診法也脈浮病在表脈沈病在裡脈數病在府脈遲病在藏浮者皮膚取而得之沈者筋骨取而得之數者一息脈六動為陽故在府遲者一息脈三動為陰故在藏張石頭先生曰此節全重於遲為在藏一句設脈見浮遲雖有表證只應以小廷中和之非麻黃青龍所宜以藏氣本虛也至於諸陽雖皆屬府諸陰雖皆屬藏然傷寒中之傳變亦有數而入藏遲而入府者非可執此概論也緩脈有二羲須分而言之也陽脈浮大而耎陰脈浮大而耎調浮中沈三候陰陽同等也名曰緩此和緩之義以脈至數無多寡而言也若脈來一息四動按之大而慢似遲而實非遲亦謂之緩此寬緩之義以脈之急慢而言也張石頑先生曰脈雖浮大而耎按之不絕者為緩如按之即無者是虛脈按之而一息不及四至者是遲脈皆非緩脈也兩手十二經脈系乎五藏六府有里有表各應其當王之時而然也遇克則死可期矣左寸裡為手少陰心經火藏也立夏心脈當王火盛故其脈洪也然洪之中須有長大和緩之意始謂之有胃氣雖病易愈也若洪而少長大和緩者謂之洪多胃少是心病脈也者但得洪而全無長大和緩意者謂之無胃是心死脈也設非夏令而心脈洪則為邪盛矣夏而心脈沈至冬當死左寸表為手太陽小腸經心之府也左關裡為足厥陰肝經木藏也立春肝脈當王木盛故其脈略弦也然略眩之中須有弱耎而長之意始謂之有胃氣雖病易愈也若略弦而少耎弱與長者謂之弦多胃少是肝病脈也若但得略弦而全無耎弱而長者謂之無胃是肝死脈也至於肝脈純弦即值春令已如樹木之將枯枝幹之乾硬不能久延況非其時又安有所希望耶春而肝脈得毛浮者至秋當死左關表為足少陽膽經肝之府也左尺裡為足少陰腎經水藏也立冬腎脈當王水盛故其脈沈也然沈之中須有滑耎之意始謂之有胃氣雖病易愈也若沈滑而少耎和者謂之沈多胃少是腎病脈也若但得沈而全無滑耎意者謂之無胃是腎死脈也非冬令而腎脈沈者則為陰寒八里也左尺表為足太陽膀胱亦謂之脬經腎之府也右寸裡為手太陰肺經金藏也立秋肺脈脈當王金盛故其脈毛浮也然毛浮之中須有緩遲之意始謂之有胃氣雖病易愈也若毛浮而少緩遲者謂之浮多胃少是肺病脈也若但得毛浮而全無緩遲意者謂之無胃是肺死脈也若毛浮而數則為病劇蓋數為火是金逢火化當發癰腫而難治之也右寸表為手陽明大腸經肺之府也右關裡為足至太陰脾經土藏也脾為坤土性主厚重王於四季其脈與陽寸陰尺同等浮大而耎無有偏勝緩而和勻不浮不沈不疾不徐不微不弱者即為胃氣也杜光庭先生云欲知死期何以取古賢推定五般土陽土須知不過陰陰土遇陰當細陰上者脾土也程鍾齡先生云脈有耍訣胃神根三字而已春弦夏洪秋毛冬石應乎四時而其中必雞有和緩悠揚之意乃為胃氣有則生少則病無則死也神者中候他浮中沈之中也如六數七極熱也中候有力則有神矣清之而熱即退如三遲二敗寒也中候有力則有神矣溫之而寒即除若寒偏熱勝中侯無神情溫之劑將何所恃耶根者沈候應指是也三部九候以沈分為根而兩尺又為根中之根也夫胃氣者如桃率核中之仁兩片相接處之一線也所賴以生生之機者此也所賴以化化之妙者此也右關表為足陽明唇經脾之府也右尺裡命門也亦日神門為真火之源所主精氣鼎峙兩腎之間附脊第十四椎為水中之火既濟陰陽男以精氣為主故右尺為命門女以精血為主故以左尺為命門以尺為六脈之根也越人云人之有尺譬如樹之有根水為天一之元先天之命根也若腎脈獨敗是無根矣如虛浮無根是有表無里孤陽豈能獨存乎若重按無根不獨先天腎水之絕亦為後天不足之徵仲景所謂營氣不足血少故也其經脈具詳於左尺矣半表半裡為手厥陰經心包絡他諸邪之干心者皆心包絡受之也諸脈雖屬於心而行於手太陰肺經然脈之運動皆由心包總之火故又以心包絡為主也右尺表為手少陽經三焦也上焦如霧中焦如瀝下焦如僧有象無質即上中下三部藏府空處是也岐伯曰寸以射上焦關以射中焦尺以射下集些言三焦之脈位也射者自下而射於上其脈即分屬寸關尺凡鼓動之機莫不本諸三焦則知六部之中部部不離三焦之氣也越人謂其有名無形者以火即氣本無形非如精津血液之各有其質也靈樞本藏云腎應骨三焦膀胱厚者密理厚皮薄者粗理薄皮急者腠理疏直者毫毛美而粗結者毫毛稀也脈有相乘繼橫逆順以徵病之重輕也五行肝木心火脾土肺金腎水此相屬也木乘上火乘金土乘水金乘木水乘火是相剋也名曰縱則病甚也木乘金火乘水土乘木金乘火水乘土是反侮他名曰橫則病微也木乘水火乘本上乘火金乘土水乘金是倒施也名曰逆則病虛也木乘火火乘土土乘金金乘水水乘木是相生也名曰順則病實也非其時而得之則相乘縱橫為患最重逆順則猶無大害他乘府乘藏宜各就脈證錯綜以參之也府陽也浮數陽脈他以浮數之脈而見於府謂之陽乘陽藏陰也遲澀陰脈也以遲澀之脈而見於藏謂之陰乘陰如浮數之脈而見於藏謂之陽乘陰又謂之府乘藏如遲澀之脈而見於府謂之陰乘陽又謂之藏乘府凡陽乘陽與夫陰乘陰者即為獨陽不生獨陰不生也其陽乘陰者病雖重亦可療陰乘陽者病即輕縱難愈所調陰病見陽脈者生陽病見陰脈者死是也陰陽相乘之脈須辨往來盛虛也陽不足以勝陰而與陰俱化則惡寒陰不足以勝陽而從陽之化則發熱陰陽之氣更盛更虛陰並則寒陽並則熱凡瘧與往來寒熱之脈皆然也營衡耎弱所以別陰陽之不足也營者統血而行於脈中陰也弱者脈沈而無力也陰脈弱則營微血虛而發熱甚則筋急也衛者統氣而行於脈外陽也耎者脈浮而無力也陽脈耎則衛衰氣虛而惡寒甚則汗流如珠也脈有上下以候陰陽五藏之升降而計生死之期也寸脈居上候心肺之陽主升升極而降降不至關謂之孤陽是陽絕也尺脈居下候肝腎之陰主降降極而升升不至關謂之獨陰是陰絕他關居於中以候脾所以升降寸尺之出入者也今上下不至關是升降出入之氣不通此皆不治決死也若陰陽已離胃氣未絕倘可苟延殘息要知死期則如經所云陰勝則陽絕能夏不能冬陽勝剛陰絕能冬不能夏肝死於秋心死於冬脾死於春肺死於夏腎死於是夏之類是也推之於日時亦然汗出發潤喘不休者肺先絕也肺為津液之帥汗者人之液也在內為血在外為汗出而似汗相著不流者氣盡液也著於發而黏故發如潤此津竭也肺為氣之主喘者疾息也口張則有呼無吸故出而不休此氣脫也身體大熱形如煙燻直視搖頭者此心絕也心為形之君神明之主也陰盡則孤陽外越故身大熟也色如煙燻者從火化也神散則目直視陽無依則頭搖也唇吻反青四肢習者此肝絕也吻者口唇邊也色當赤而黃乃脾之本然因被木所克故從其勝而反青也肝主筋藏血血竭則筋脈無所養而引急者汗出貌也習者鳥數飛也言手足額動之狀若汗之不期然自出如鳥之習飛而無己時也環口黧黑柔汗發黃者此脾絕也唇口應於脾色當黃且赤今轉為水侮而暗黑則土敗可知柔者耎而膩也汗者液也柔汗者乃脾之真液即俗之所謂冷汗是也黃為土之本色真液竭而真象露也便尿自遺狂言目反直視者此腎絕也腎藏精志而司啟閉二便自遺者精力盡而禁約馳也志失則狂言精不上榮則瞳子不能轉而直視也身汗如油液外亡也喘而不休氣上脫也水漿不下胃氣無也形體不仁營衛離也乍靜乍亂神無主也六脈無根則命絕也持脈大綱輕手候之脈見於皮膚之間者心肺之應也心肺在上故其脈皆浮也浮大而散者心也浮澀而短者肺也陽也府也重手按之脈附於筋骨之間者肝腎之應也肝腎在下故其脈皆沈也弦而且長者肝也沈而耎滑者腎也陰也藏也不輕不重中而取之脈見於肌肉之間者脾胃之候也脾胃在陰陽相通之中故其脈緩而大也此五藏不病之脈也若短小而見於皮膚之間者陰乘陽也若洪大而見於肌肉之下者陽乘陰也脈有浮沈診分輕重也左寸先以輕手得之是小腸屬表後以重手得之是心屬裡心在肺下主血脈心脈循血脈而行按至血脈而得為浮稍加力得脈道粗大為大又稍加力得脈道潤耎為敬此即上文浮大而散之謂也若出於血脈之上見於皮膚之間是其浮也若人於血脈之下見於筋骨之分是其沈也右寸先以輕手得之是大陽屬表後以重手得之是肺屬裡肺居最高主皮毛肺脈循皮毛而行按至皮毛而得為浮稍加力得脈道不利為澀又稍加力脈道縮入關中上半指不動下半指微動為短此即上文浮澀而短之謂也若出於皮毛之上見於皮膚之表是其浮也若入於血脈筋肉之分是其沈也在關先以輕率取之是膽屬表後以重不得之是肝屬裡肝在脾下主筋肝脈循筋而行按至筋得脈道如弓弦者為弦稍加力得脈道迢迢為長此即上文弦長之謂也若出於筋上見於皮膚血脈之間是其浮也若入於筋下見於骨上是其沈也右關先以輕手得之是胃屬表後以重手取之是脾屬裡脾在心下主肌肉脾脈循肌肉而行按至肌肉得脈道如微風輕楊柳稍之狀為緩稍加力得脈道敦實者為大此即上文緩而大之謂也若出於肌肉之上見於皮毛之間者是其浮也若入於肌肉之下見於筋骨之分者是其沈也左尺先以輕手得之是膀胱屬表後以重手取之是腎屬裡腎在肝下主骨腎脈循骨而行按至骨上得之為沈重手按之脈道無力者為耎舉指來疾流利者為滑此即上文沈而耎滑之謂也若出於骨上見於皮膚血脈筋肉之間是其浮也若入而至骨是其沈也右尺光以輕手得之是三焦為表再以稍重手得之是心包絡為半表半裡諸邪干心者皆心包絡受之也更以重手得之是命門兩臂居其左右為里為相火與方尺之氣通也男以右尺為命門女以左尺為命門余皆無所異也左手關前曰人迎以候風寒暑濕燥火六氣之外因也浮盛則傷於風肝脈應之緊盛則傷於寒腎脈應之虛弱則傷於暑心包絡應之沈細叨傷於濕脾脈應之滯澀則傷於燥肺脈應之虛數則傷於火心脈應之火者熱也此皆外國法當表散滲泄也右手關前曰氣口以候喜怒憂思悲恐驚七情之內因也喜則脈散心應之怒則脈耎肝應之憂則脈檣肺應之思則脈結脾應之悲則脈緊心包絡應之恐則脈沈腎應之驚則脈動膽應之此皆內因法常溫順以消平之也六脈傷損謂之不內不外因也心脈虛澀傷於勞神役慮也肝脈虛弦傷於筋力疲極也腎脈緊傷於勞役陰陽也肺脈弱傷於叫呼損氣也脾脈緩弦傷於飢餓也脾脈滑實傷於飽食也命門脈微澀傷於房帷任意也脈有表裡陰陽主病之異表病取決於人迎為陽為府外感則人迎脈緊盛也里病取決於氣口為陰為藏內傷則氣口脈緊盛也表裡皆病則人迎氣口俱緊盛也男子之脈左大於右在關上為順寸脈常盛尺脈常弱是以不可久瀉也女子之脈右大於左在關下為順寸脈常弱尺脈當盛是以不可久吐也上部有脈下部無脈其入當吐不吐必死也上部無脈下部有脈病雖重不死何也蓋人有尺脈謂有元氣猶樹之有根也凡人左手屬陽關前琶陽諮陽為熱汗多亡陽右手屬陰關後亦屬陰諸陰為寒下多亡陰也脈理大耍浮沈遲數滑澀也浮為陽主表為風為虛沈為陰主裡為濕為實遲則在藏為寒為冷為陰數則在府為熱為燥為陽滑則為血有餘氣不足也澀則為氣有餘血不足也諸脈主病大略浮不沈也如水漂木也陽也主病在表為邪襲三陽經中鼓搏脈氣於外也為風為虛為熱為痛為嘔為痞為滿為不食為喘浮而大為傷風鼻塞浮而滑疾為宿食浮滑為飲也左寸浮主傷風發熱頭疼目眩及風痰浮而虛遲為心氣不足心神不安浮而散為心氣耗虛煩浮而洪數為心經熱左關浮主腹脹浮而數風熱入於肝經浮而促為怒氣傷肝心胸逆滿浮而大為胸脅脹滿左尺浮為膀胱風熱小便赤澀浮而扎男子小便血女子崩帶浮而遲為冷疝臍下痛右寸浮為肺感風寒咳喘清涕自汗體倦浮而洪為肺熱而咳浮而遲為肺寒喘嗽作欠右關浮為脾虛中滿不食浮大而澀為宿食浮而遲為脾胃兩虛右尺浮為風邪客下焦大便秘浮而虛為元氣不足浮而數為了焦風熱大便秘凡瘦人得浮脈三部相得曰飢薄若肥人得之未有不病者也一沈不浮也如石在水底也陰也主病在裡為陽氣式微不能統運營氣於表也為陰逆陽郁為氣為實為熱為水為停飲為癥瘕為脅脹為厥逆為恐懼為腰痛為水泫滀洞泄沈而細為少氣沈而遲為痼冷沈而滑為宿食沈而伏為霍亂沈而數為內熱沈而遲為內寒沈而弦為心腹冷痛左寸沈為寒邪為痛為胸中寒飲脅疼左關沈為伏寒在經兩脅刺痛沈而弦為疲癖內痛左尺沈為腎藏感寒腰背冷痛小便濁而頻男為精冷女為血結沈而細為脛酸陰庠尿有餘瀝右寸沈肺冷寒痰停蓄虛喘少氣沈而緊滑為咳嗽沈細而滑為骨蒸寒熱皮毛焦乾右關沈為胃中寒積中滿吞酸沈而緊為懸飲右尺沈為病水腳連腰疼沈而細為下利為小便滑為臍下冷痛傷寒陽證兩寸沈曰難治平人兩寸沈曰無陽必艱於壽遲一息三至也陰也為陽氣不顯營氣自和之象也為陰盛陽虧之候為寒為痛為不足浮而遲為表有寒沈而遲為里有寒兩寸沈而遲為氣不足氣寒則縮也兩尺沈而遲為血不足血寒則凝也左寸遲為心上寒精神多慘左關在為筋寒急手足冷脅下痛左尺遲為腎虛男子便濁女子不月右寸遲為肺感寒冷痰氣短右關遲為中焦寒及脾胃傷冷物不食沈而渥為積右尺遲為藏寒泄瀉為冷少腹痛腰腳重數一息六至也陽也為陽盛陽虧熱邪流薄於經絡之象也為陰虛為熱為煩滿上為頭痛上熱中為脾熱口臭為胃煩嘔逆左為肝熱目赤腫右為小便黃赤大便秘澀浮而數為表有熱沈而數為里有熱也脈來數而牢加銀釵之股為蠱毒滑往來流利也忽浮忽沈也多血小氣也陽中陰也為血實氣壅之候為痰為飲為嘔吐為宿食浮而滑為嘔逆沈而滑為氣結滑而數為結熱左寸滑為心熟滑而實大為心驚舌強左關滑為肝熱頭目為患左尺滑為小便淋澀為尿赤為莖中痛右寸滑為痰飲嘔逆滑而實為肺熱毛髮焦為膈壅咽乾為痰嗽為頭目昏為涕唾黏右關滑為脾熱口臭為宿食不化吐逆滑而實為胃熱右尺滑為相火炎而引飲多為臍冷腹鳴或時下利兩寸滑日痰火一手獨滑曰半身不遂澀往來沾滯也多氣少血也陰也為血枯為精涸為盜汗為心痛為不仁浮而澀為表惡寒沈而澀為里燥涸兩寸澀甚曰液不足兩關澀甚曰血不足兩尺澀甚曰精不足必艱於嗣也左寸澀為心神虛耗不安為泠氣心疼左關澀為肝虛血散為肋脹脅滿為身痛左尺澀男子為傷精及疝女人為月事虛敗若有孕主胎漏不安右寸澀為營衛不和為上焦冷痞為氣短臂痛右關澀為睥弱不食為胃冷而嘔右尺澀為大便秘為津液不足為小腹寒為足脛逆冷緊糾也如轉索無常按之雖實而不堅不似弦脈之端直如琴絃不似牢脈革脈之強直搏指也為諸寒收引之象亦有熱因寒東而煩熱急疼痛者也為邪風激搏於營衛之間陰陽相搏也為痛為寒為筋孿為中惡緊而洪為癰疽緊而數為中毒為寒熱緊而細為疝瘕緊而澀為寒痹緊而浮為傷寒身疼沈而緊為腹中有寒為風閒左寸緊為頭熱目痛項強緊而沈為心中氣逆冷痛左關緊為心腹滿痛脅痛肋急緊盛為傷寒渾身痛緊而實為痃癖內脹痛左尺緊為腰腳臍下痛小便難右寸緊為鼻塞膈壅緊而沈滑為肺實咳嗽右關緊為脾腹痛為吐逆緊盛為腹脹傷食右尺緊為下焦築痛緩脈來不浮不沈不疾不徐從容和勻一息四至或五至者是無病之正脈也其脈雖一息四至舉按大而慢者亦謂之緩也陰也為不足為風為表虛為弱為疼為項強為腳弱與遲脈之不及至發者相區遠甚也浮而緩為衛氣傷沈而緩為營氣弱諾部見緩脈皆謂之不足以其不鼓也左寸緩為心氣虛為怔仲為健忘為項背急痛左關緩為風虛眩暈為腹脅氣結左尺緩為腎虛冷為小便數女人月事多右寸緩為肺氣浮言語短氣右關緩為胃弱氣虛浮而緩為脾氣虛弱右尺緩為下寒腳弱為風氣秘滯浮而緩為腸風泄瀉沈而緩為小腹感冷曰虛不實也浮中沈三候中取重按脈皆遲大耎弱久按仍不乏根也為氣血兩虧之候也陰也為暑腸澼為陰虧為精氣不足為煩滿多汗為驚若氣口脈大而虛者為內傷於氣若虛大而時顯一澀者為內傷於血也左寸虛為驚悸左關虛為肝衰右寸虛為喘息右關虛為脾弱兩尺虛為腎怯眾澀者必艱於嗣實不虛也浮中沈三候按之皆有力大而長也為三焦氣滿之候陰中之陽也為邪氣內盛非正氣本充之調也為熱為嘔為痛為氣塞為氣聚為食積為痢左寸實心中積熱口舌瘡為咽痛實而大為頭面風熱煩躁為體痛為面赤左關實為腹脅痛滿實而浮大為肝盛目暗赤痛左尺實為少腹痛為小便澀實而滑為淋瀝為莖痛尿赤實而大為膀胱熱尿難實而堅為腰痛右寸實為胸中熱為痰嗽為煩滿實而浮為肺熱咽喉燥痛為喘嗽氣壅右關貿為伏陽內蒸為脾虛食少為胃氣滯實而浮為脾熱消中善飢口乾為勞倦右尺實為臍下痛為大便難或時下痢小細而顯也陰也為元氣不足若兩手三部皆小往來上下皆從此由稟質之清不在病例也若一部獨小或一手獨小為病脈也乍大乍小為邪祟則大後小為頭疼目眩前小後大為胸滿短氣六脈小而急為疝瘕在陽為陽不足在陰為陰不足若小而按之不衰久按有力乃實熱固結之象總因正氣不充不能鼓搏熱勢於外也一大應指滿溢倍於尋常也陽也若兩手三部皆大往來上下自如此由稟質之厚不在病例也大脈有虛實陰陽之界經云大則病進是指實大而言也仲景以大則為虛者乃盛大少力之謂也又有下痢未止脈大者是又以積滯未盡而言非大則為虛之謂也有六脈俱大者為陽有餘陰不足也有偏大於左者為邪盛於經也有偏大於右者為熱盛於內也亦有一部獨大者便以其部斷其病之虛實可也長指下迢迢過乎本位也陽也長而和緩為氣血充盈長而大為陽毒內蘊為三焦煩郁為壯熱長而耎滑為氣治長而堅搏為氣病在上主吐在中主飲在下主疝長而洪為顛狂尺寸俱長為陽明受病兩尺修長主人多壽女人左關獨長多淫欲短指下不及本位也陰也為胃氣呃塞不能條暢百脈也為氣少為陰中伏陽為三焦氣壅為宿食不消寸不及關為陽絕尺不及關為陰絕乍短乍長為邪祟兩寸短為頭痛兩開短為宿食兩尺短為脛足冷凡過於悲哀之人則其脈多短也扎浮沈二候有力中候無力也邊有中無也陽中陰也為失血之候陰去陽存之脈也為潰精為盜汗為氣盈血虧左寸芤為吐血為衄血左關芤為脅閒血氣痛為腹中瘀血痛為吐血為目暗左尺芤為小便血女人月事為病右寸芤為胸中積血為衄為嘔右關芤為腸癰瘀血為嘔血不食右尺芤大便血伏脈不出也重按至骨指下澀難委曲求之脈行筋下附著於骨也陰也為陰陽潛伏關格閉塞之候也為寒氣凝結為積聚為疝瘕為少氣為憂思為痛甚為霍亂為溏泄為停食為水氣為營衛氣閉而厥逆如關前得之為陽伏如關後得之為陰伏也伏而數者為熱厥亢極而兼水化也伏而遲者為寒厥陰極而氣將絕也左寸伏為心氣不足為神不守舍為深憂抑鬱左關伏為血冷為腰腳痛為脅下有寒氣左尺伏為腎寒為精虧為疝瘕寒痛右寸伏為胸中氣滯為寒痰冷積右關伏為胸中脘積塊作痛為脾胃停滯右尺伏為臍下冷痛為卞焦虛寒為腹中痼冷洪脈來指下極盛脈去極衰也陽也為陽氣滿溢陰氣垂絕之象也為火氣亢甚之兆血氣燔灼之候也為表裡皆熱為煩為咽乾為大小便不通方寸洪為心經積熱目赤口瘡頭痛內煩左關洪為肝熱身痛為四肢浮熱方尺洪為膀胱熱小便赤澀右寸洪為肺熱毛焦為唾黏咽乾洪而緊為喘急右關洪為胃熱反胃為嘔吐日乾洪而緊為脹右尺洪為腹滿為大便難或下血洪而有力為實火洪而無力為虛火洪而急為脹滿洪而滑為熱痰洪而數為暴吐為中毒諸矢血為遺精白濁盜汗脈洪為難己傷寒汗後脈洪則死耎柔而無力也脈來如絮浮水面輕取乍來重取乍去為胃氣不充之象也陰也真火不足也為內傷為虛勞為泄瀉為少食為自汗為喘乏為精傷為痿弱為少氣為無血為下冷左寸耎為心虛易驚為盜汗短氣左關耎為營衛不和精神離散為體虛小力左尺耎為小便數自汗多男為傷精女為脫血右寸耎為哄熱僧寒氣乏體虛右關耎為脾弱食不化為胃虛不進飲食右尺耎為下元冷憊為腸虛紲瀉弦脈來浮而緊端直以長如新張弓弦挺然指下按之不移也陽中陰也為氣血收斂不舒之候也偏弦者脈來弦而攲斜也為流飲作痛雙弦者脈來弦如引二線也為肝實作痛其軍弦者脈弦只一線也為經絡間凝塞滯痛為瘧為拘急為寒熱為血虛盜汗為寒凝氣結為冷痹為疝為飲為勞倦弦而數為勞瘧雙弦而數為脅急痛弦而長為積左寸弦為頭疼為心暢為勞傷盜汗乏力左關弦為脅肋痛為痃癖弦而緊為疝瘕為瘀血弦而小為寒癖左尺弦為小腹痛弦而滑為腰腳痛右寸弦為肺受寒咳嗽胸中有寒痰右關弦為肺胃傷冷宿食不化為心腹冷痛為水飲右尺弦為臍下急痛為下焦停水弱衰敗也脈來極沈細而耎按之欲絕未絕舉之如無也陰也為氣血兩虧之候也為痼冷為攲熱為泄精為虛汗弱而滑者是有胃氣弱而澀者是謂久病凡老人及病後見之順平人及壯年見之逆也在寸弱為陽虛心悸自汗左關弱為筋痿無力婦人主產後客風面腫左尺弱為腎虛耳聾為骨肉痠痛為小便數右寸弱為身冷多寒為胸中短氣右關弱為脾胃虛食不能化右尺弱為下焦洽痛大便滑泄微不顯也浮中沈三候極無力按之似有似無依稀輕細而模糊也陰也為陽氣微陰氣衰也為尫嬴為泄瀉為虛汗為少氣婦人為崩漏敗血不止浮而微為陽不足身惡習沈而微為陰不足主藏寒下痢左寸微為心虛憂惕營血不足為頭痛為胸痞為虛勞盜汗左關微為胸滿氣乏為脾虛泄瀉為四肢惡寒為前急左尺微為敗血不止男為傷精尿血女為崩帶右寸微為上焦寒痞為冷痰不化為中寒少氣右關微為胃寒氣脹為食木化為脾虛噫氣為心腹冷痛右尺微為藏寒泄瀉臍下冷痛動脈來如豆粒之動搖上下無頭尾尋之有舉之無不往不來不離其處也陽中陰也為陰固於內陽戰於外之候也為氣血不續為痛為驚為虛勞為崩脫為泄痢陰陽相搏謂之動陽動則汗比陰動則發熱是指人迎氣口而言然多有陰虛發熱之脈動於尺內者陽虛自汗之脈動於寸口者所謂虛者則動邪之所奏其氣必虛也牢脈沈而堅實守而不移也陰中陽也為胃氣竭絕精血遺亡而氣獨守之候也為裡實表虛胸中氣結勞作腐極男子遺精女子牛產漏下若中風而見牢脈為陰虛而風勁病濕而見牢脈為土亢而風木相乘皆謂無宵氣經曰脈不往來者死貫斯之謂也竺脈來數疾時忽一止也陽也為陽獨盛而陰不能和之也為氣結為癰疽為冒背痛為狂為怒為瘀血發斑為氣為血為飲為食為痰此皆陽邪內陷之象見之多難治結脈來緩時忽一止也或二動而止或三動而止無常數也陰也為陰獨盛而陽不能入之也為癥結為寒氣為七情抑鬱浮而結為寒邪滯經沈而結為積氣在內為氣為血為飲為食為痰此皆陰邪固結之象則近死可知矣代更替也脈來五動一止不能自還須臾復來依前五動至數有常並無增減亦有七動一止良久復來而仍如前數者皆由元氣不續故也若在病後或風家心腹痛家傷寒心悸家跌打悶亂家霍亂家娠身家而見此則未可遽謂之死候若不因病而其人羸瘦或他病而見代脈者乃一藏已經無氣故求他藏以肛續之斯則必死無疑矣散分離也渙而不聚也有表無里至數不齊來去不明漫無根蒂為血亡而氣欲去也為腎敗為虛陽不斂為心氣不足為衛氣散漫皆非佳兆也戴同父先生云心脈浮大而散肺脈短澀而散平脈也心脈耎散為怔忡肺脈耎散為汗出肝脈耎散為溢飲脾脈耎散為脛端腫皆病脈也腎脈耎散者死其諸病脈代散交見者皆死脈也毛脈來浮澀類羽毛也病病與澀脈同鉤脈來數大而耎按之指下委曲旁出也昔人以洪為夏脈內經以鉤為夏脈遂有鉤即是洪之說然痰食瘀積阻礙脈道關部常屈曲而出此與夏脈之微鉤者似同而實不預也石陽至而絕腎之危脈也水絕不能濟火故有此脈也張石頑先生雲實節是石愊愊如彈石狀為腎絕之兆矣溜脈來如水之溜陰陽和平無相勝負其即滑而清之謂乎疾呼吸之間脈七八動也有陰陽寒熱真假之異如疾而按之益堅乃亢陽無制真陰垂絕之候若疾而按之不鼓又為陰邪暴虐虛陽發露之徵然亦有熱毒入於陰分而為陰毒者脈必疾盛有力不似陰寒之毒脈雖疾而弦細乏力也疾者數之甚也或謂躁或謂駛皆熱極也革脈眩大而數浮取強直重按中空如鼓皮之狀也嬰寧先生云革乃虛革之象雖失常度而按之中空未為真藏也仲景曰革脈為虛寒相搏男子為亡血矢精嫩人為牛產漏下脈經云三部脈革長病得之死卒病得之生時珍曰此即扎弦二脈相合故均主失血之候諸家脈書皆以為牢脈故或有革無牢有牢無草混淆不辨不知革浮牢沈革虛牢實形證迥殊出程鍾齡先生云革脈者浮而堅急為精血少也細脈小於微而常有細直而耎若絲線之應指也張石頑先生云細脈者往來如髮指下顯然不似微脈之微強模糊也為陽氣衰弱之候尺寸沈細為太陰受病沈細而數為少陰病不可發汗也素間謂之小脈經有細無小為血少氣衰凡憂勞過度及吐血衄血之人得細脈為順他病見之則逆也清脈來輕清緩滑流利有神也為氣血牛調之象在左主清貴仁慈在右主富厚安闖在寸主聰慧在尺為壽徵若寸關俱清而尺中蹇澀或偏大偏小者主晚景不佳及艱子嗣也濁脈來重濁洪盛騰湧滿指浮沈滑實有力也為稟賦昏濁之象左主汗下右主庸愚若重濁中有種滑利之象主家道富饒濁而兼得塞澀之狀或偏盛偏衰者不能享安康又主夭枉似重濁而按之和緩此濁中兼清外圓內方之應也死脈湧泉一名沸釜脈在筋骨閒加泉之湧湧而出此太陽氣予不足也浮合脈來後至者反凌乎前如浮波之臺此經氣不足也彈石脈在筋骨間辟辟然而至如石之彈指也雀啄脈連來三五下堅而且銳如鳥之啄食也屋漏脈來良久一滴濺起而無力也懈索脈來如亂繩初解之狀渙散之意也魚翔脈來浮中間忽一沈如魚之出沒也蝦遊脈來沈中間忽一浮如蝦之跳躍也偃刀一名循刃脈來一絲堅勁如循鋒刃之芒此五藏蘊郁寒熱獨並於腎也轉豆一名泥丸脈來形大且短且堅而且澀此胃精予不足也火新脈來如火之初然隨起隨滅此心精之予奪也散葉脈來如葉之散落無常此肝氣之予虛也省客脈來如省問旋去之客此腎氣予不足也交漆脈來左右旁至加絞漆之嫋嫋相交而下此太陽氣予不足也橫格脈來橫阻如木拒格於指下此膽氣予不足也弦縷亦名偃刀脈來細而直此胞精予不足也委土脈來頑而虛如委頹之土狀此肌氣予不足也懸癰脈來如懸費之癰丸丸左右相彈而棚不移此十二俞之予不足也如丸脈來滑不直手按之而不可得此大腸氣予不足也如春脈來極洪極實如杵之搗春也如喘脈來如喘人之息有出而無入此腎氣不能下守也霹靂脈來靜時忽鼓指數下而去如霹靂之轟空也開格人迎四盛以上為格陽氣口阿盛以上為關陰覆溢亦名關格脈來洪滑陷入尺中謂覆脈來沖逆上入於魚際謂溢也心脈前曲後踞如換帶鉤者死肝脈堅勁如新張弓弦又如循刃者死脾脈堅銳如鳥之啄如鳥之距加壓之漏如水之流介然不鼓者死肺脈如草之浮於水面如風之吹柳絮者死腎脈發如解索辟辟如彈石者死婦人脈法婦人尺脈常盛而右手脈大皆其常也婦人之脈常隨肝腎而行故以左尺為命門其病惟經候胎產異於男子他則無所殊也若腎脈微澀與浮或肝脈沈急或尺脈滑而斷續不勻皆經閉不調之候也婦人尺脈微遲為居經月事三月一下血氣不足故也婦人三部脈浮沈正等無他病而經停者孕也尺大而旺亦為好子左尺洪大滑實為男右尺洪大滑實為女婦人手少陰脈動甚者好子也寸為陽位若見動滑剛為血充血顯陽象左葉熊罷右應驚鳳可預卜而無疑者也體弱之婦尺內按之不絕便是妊子月斷病多六脈不病亦為有孕所以然者體弱而脈難顯也脈經日三部浮沈正等按之無絕者妊娠也何嘗拘於洪滑耶陰搏陽別謂之有子搏伏而鼓也陰搏者尺中之陰搏也是陰中有別陽故謂有子陰搏陽別者言尺內陰脈搏指與寸口陽脈迥別其中有陽也尺數而旺無他病而不月者亦妊子也脈平而虛者乳子也婦人初妊時寸微尺數按之散者三月也不散者五月也脈經曰左手沈實猥生二男左右手俱浮大猥生二女也妊身七八月脈實牢強大者吉沈細者難產而死也妊娠之脈宜實大有力忌沈細弦急虛澀經斷有軀其脈弦者後必大下不成胎也然有因病脈弦又當以保胎為務氣旺則弦自退矣新產傷陰出血不止尺脈不能上關者死產後之脈宜沈小微弱忌急實洪數不調新產中風熱病脈宜浮弱和緩忌小急懸絕手足溫則生冷則死婦人陰陽俱盛曰雙軀若少陰微緊者血即凝濁經卷不周胎則偏矢其一獨死其一獨生不去其死害母失胎婦人得革脈曰半產漏下脈宜細小流連最忌急實斷絕不勻得雕經之脈曰產期臨產脈宜滑數離經最忌虛遲弦細短澀離經者離乎經常之脈也胎動於中則脈亂於外勢所必然也脈牢革者更非所宜婦人帶下脈浮惡寒漏下者不治崩漏不止者脈宜細小芤遲忌虛澀數實婦人尺脈微弱而澀小腹冷而惡寒年少得之為無子年大得之為絕產因病而脈澀者孕多難保尺脈虛大茲數者皆內崩而血下謂之陰虛陽搏若消瘦不月者二陽之病發於心脾也好身外感風邪脈宜緩滑流利最忌虛澀躁急虛澀則不固躁急則熱盛傷胎多難治也胎前下利脈宜滑小不宜洪數洪數則防其胎墮墮後七日多凶治療之法攻積必死兜澀亦死急宜伏龍肝湯煎溫養脾胃藥間有得生者也婦人經水三月不來脈得兩寸浮大兩關滑利兩尺滑實而帶數此有胎也若有形而不動或當臍下翕翕微動如抱甕之狀按之冰冷或兩尺乍大乍小乍有乍無或浮或沈或動或止早暮不同乃鬼胎也須診視二三日乃見宜補氣活血溫養脾胃則經水自通矣若脈來疾如風雨亂點忽然而去久之復來如初者是夜又胎也亦有左關之脈指下見兩歧而產夜又者總與尋常脈不類也妊娠脈弱氣血虛也須防胎墮急宜補氣養血脈來弦急是火盛也亦須防墮急宜涼血脈來沈細弦急僧寒壯熱唇口青黑是胎損也當問胎動否若不動反覺上搶心悶絕按之冰冷者當作死胎治之婦人崩漏胎產久病脈來總以遲小滑緩為順急疾數大者逆婦女傷寒熱病須問經事若何百病皆然非止此也產後須問惡露多寡色淡色濃及少腹中有無結塊此大法也幼孩脈法三歲以上看虎口三關即宜指之三節初為風關即近掌第一節次為氣關中節未為命關一指之上節即指甲內男友女右為則紋色紫曰熱紅曰傷寒青曰驚風白曰痳淡黃淡紅曰無病黑色者危在風關為輕氣關為重命關為危三關多亂紋為內釣腹痛氣不和也紋直而細者為虛寒少氣多難愈紋粗而色顯者為邪於正氣多易治紋中有斷續如流珠者為有宿食紋自外向里者為風寒紋自內向外者為食積岐伯曰陰絡之色應其經陽絡之色變無常隨四時而行也寒多則凝位凝位則青黑熱多則淖澤淖澤則黃赤此皆常也三歲以上乃以一指取寸關尺三部脈常以六至為率七至亦不為病加則為熱減則為寒皆如大人診法也浮弦為乳癇弦緊為風癇虛澀為慢驚沈弦為腹痛弦實為氣不和牢實為便秘沈細為冷乳不消沈滑為宿食不化或小或大或沈或細皆為宿食停滯浮大為傷風伏結為物為疳勞沈數為骨蒸有熱也嬰兒病赤瓣餐泄脈小手足寒難已脈小手足溫易己小兒脈亂身熱汗出不食食即吐上層有珠狀者多為變蒸小兄四未獨冷股慄惡塞面赤氣洶涕淚交至必為痘疹或見其顆赤目亦呵欠煩悶乍涼乍熱及耳後有紅絲紋縷脈來數盛者皆痘疹之候也諸病宜忌脈附張石頑先生諸脈順逆中風一宜浮渥忌急實數大中風口噤緩弱為順急實大數為逆中風不仁痿躄不遂虛耎緩為順堅急疾為逆中風遺尿盜汗緩弱為順數盛為逆中風便尿阻澀滑實為順虛澀為逆中惡宜浮緩忌堅數浮大中惡腹滿緊細微滑為順虛大急數為逆中毒宜洪大而遲忌細微浮大數疾為順微細虛澀為逆傷寒未得汗宜陽脈忌陰脈浮大為陽易已沈小為陰難已傷寒已得汗宜陰脈洪大宜陽脈沈細沈小安靜為順浮大躁疾為逆中寒猝倒沈伏為順虛大為逆溫病未得汗宜陽脈忌陰脈數盛有力為順細小無力為逆溫病得汗後沈小安靜者生盛躁不衰者死溫毒發斑言語發狂脈實便秘為順脈虛便滑為逆溫病斑色紫黑如果實之靨雖便秘能食便通即逝狂妄躁渴昏不知人下後呃逆者陽去入陰者死時行疫癘數盛滑利為順沈細虛澀為逆大頭天行數盛滑利為順沈細虛澀為逆凡時行疫癘及大頭天行皆由濕土之邪內伏故左手脈多弦小右手脈多數盛總宜辛涼內奪為正切忌辛熱外散尤忌發表若脈陰陽俱緊頭痛身熱而下利足冷者必死效嗽初起宜浮耎忌堅急弦小浮耎和滑為順沈細數學為逆久嗽一緩弱為順弦急實大為逆勞效骨蒸虛小緩弱為順堅大澀數為逆最忌弦細數疾腹脹宜浮大忌沈小關部浮大耎滑為順虛小短澀為逆鼓脹滑實流利為順虛短微澀為逆下鋼初起宜沈細忌浮大下痢發熱宜浮忌數下痢兼積宜實大耎滑忌虛弱久痢沈細和滑為順浮大眩急為逆沈小細弱按之無神者不治癲疾宜實大忌沈細虛滑大為順澀小為逆堅急而小者不治狂疾大實為順沈澀為逆消渴宜數大忌虛小數大耎滑沈為順細小浮短堅實為逆水腫宜浮大忌沈細浮大耎弱為順澀細虛小為逆沈細滑利雖危可救虛小散澀者不治上氣喘咳宜伏匿忌堅強耍弱緩滑為順澀數堅大為逆堅則無胃氣也如瀉者不治喘急宜浮滑忌短澀手足溫者為順手足冷者為逆澀則無胃氣也脈數者不治霍亂宜浮洪忌微遲脈實病在中脈虛病在外脈澀皆所忌也霍亂脈伏為冷食停滯胃氣不行不可便斷為逆惟搏大者難治既吐且利不宜復見實大也霍亂止而脈代為元氣暴虛不能接續不可便以為逆厥冷遲微者難治陽氣本衰加以暴脫非溫補不能救也腹痛宜虛小遲忌堅大疾心腹痛不得息宜沈細忌浮大弦長沈細遲小為順弦長堅實為逆心腹積聚實強和滑為順虛弱沈澀為逆心痛宜浮滑忌短澀症積宜沈實忌虛弱脫血宜陰脈忌陽脈程鍾齡先生云便血有腸風有藏毒有熱有寒尿血有心氣熱者有肝氣熱者俱宜詳晰分別施治不可概論金創失血過多宜細微忌緊數虛微細小為順數盛急實為逆陰脈不能至陽者死跌墮腹脹畜血宜堅強忌小弱弦大可攻為順沈澀為逆痿痹宜虛耎忌緊急虛澀為順緊急為逆蟲食病宜虛小忌緊急唾血宜沈弱忌實大芤小而弱為順弦急實大為逆鼻衄宜沈細忌浮大沈滑微小為順實大堅疾為逆吐血宜沈小忌實大沈小為順堅強為逆吐血咳逆上氣芤耎為順細數為逆眩勁者為不治陰血既亡陽無所附故脈來芤耎若細數則陰虛火炎加以身熱不得臥不久必死弦勁為胃氣之竭亦無生理也腸僻下膿血宜浮小沈澀忌數疾堅大身熱者死泄瀉宜小忌大微小為順急疾數大為逆腸僻下白沫脈沈則生脈浮則死初病而兼表邪常有發熱脈浮可用建中而愈與病久不同也破傷發熱頭痛浮大滑為順沈小澀為逆內傷宜弦緊忌小弱內傷勞倦氣口虛大者為氣虛弦細而澀者為血虛若躁疾豎搏汗出發熱不止者死以裡虛不宜復見表氣之開泄也內傷飲食脈來滑盛有力者為宿食停胃澀伏模糊者為寒冷傷脾非溫消不能克應也中暑自汗喘乏腹滿遺尿虛弱為順躁疾為逆中暍熱也猝倒微弱為順散大為逆氣厥食厥痰厥蚘厥皆以小弱為順數盛為逆凡氣食痰蚘等厥為氣道壅遏所致皆由真陽素虧而然故脈總以細小流連為順數實堅大為逆至於徽大而澀尤非所宜也熱病脈尚盛躁而不得汗者死此陽脈之極也脈盛躁得汗靜者生熱病已得汗脈尚盛躁者死此陰脈之極也得汗而脈靜者生熱病汗下後脈不衰反躁疾者死此名陰陽交也噎膈嘔吐咸以浮滑大便潤者為順此痰氣阻逆胃氣未艾也弦緊澀涎如雞蛋清大便燥給者為逆此氣血枯竭痰火蘊結也肺痿虛數為順短澀為逆數大而實者不治肺癱初起微數為順洪大為逆肺癰巳潰緩滑為順短澀為逆氣病而見短澀之脈氣血交敗安能望其生乎汗出若衄沈滑細小為順實大堅疾為逆淋閟滑疾者易巳澀小者難已消癉病久實大者可治堅小者難愈癰疽初起微數緩滑為順沈澀堅勁為逆癰疽未潰洪大為順虛澀為逆癰疽潰後虛遲為順數實為逆腸癰耎滑微數為順沈細虛澀為逆凡病瘡脈弦強小急腰脊強瘛眼皆不可治漬後被風多此痙病浮弦為順沈緊為逆若牢細豎勁搏指者不治
