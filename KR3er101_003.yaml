body:
  text: 卷三經脈心傳肺手大陰之脈附脊第八稚自上陶道穴起至下腰俞穴止計二十一椎邪在氣則病胸中脹滿而喘咳肺宜溫潤燥則病寒亦病效者有聲而無痰也或胸中痛或缺盆中痛甚則兩手麻木不仁邪在血則效或上氣喘渴心煩胸滿或肩臂前廉痛氣有餘則喘渴或胸盈仰息或肩背痛如風寒在表則汗出如中風則小便數而少氣不足則肩背惡寒或少氣不足以息小便色黃赤氣絶則皮毛焦瓜枯毛折肺屬金病則色白好哭喜辛流涕多慮多憂所主者氣所藏者魄所惡者燥上應於鼻外應於皮毛白而淖澤肺胃之充也肥白而按之綿耎氣虛有痰也白而消瘦瓜甲鮮赤氣虛有火也白而夭然不澤瓜甲色淡肺胃虛寒也白而微青或臂多青筋氣虛不能統血也白而爪甲色青則為陰寒之證白為氣虛之象縱有失血發熱皆為虛火斷無實熱之理也補藥人參五昧子山藥百部阿膠黃萇麥門冬紫苑茯苓瀉藥防風桑白皮寧藶澤瀉紫蘇子枳殼溫藥木香款冬花生薑乾薑白豆蔻涼藥元參北沙參貝母天門冬山俑枯芩瓜簍仁桔梗馬兜鈴人尿引經藥蔥白升麻白芷大腸手陽明之脈上口即小腸之下口也下接肛腸為肛門穀道即後陰是也邪干氣則齒痛惡熱飲或頓腫邪乾血則目黃口乾或鼻衄或喉痹而能言或腹中雷鳴切痛感寒則瀉氣常沖胸或日間發瘧而渴或肩前痛食指不仁氣有餘則當脈所經之處皆熱腫手陽明脈起於大指次指之端出合谷兩骨之間上入兩肋之中循臂上廉入肘外廉上肩腳外前廉出肩前兩間骨之前廉上柱骨之會上下入缺盆皮膚堅腫而不痛氣不足則寒栗不復或背肘臂外痛補藥牡蠣粉訶黎勒龍骨粟殼肉豆蔻五倍子蓮子瀉藥大黃相殼桃仁石斛芒硝榕榔麻仁一溫藥乾薑吳茱萸肉桂涼藥槐花條芩引經藥葛根白芷升麻石膏胃足陽明之脈下口即小腸上口也邪於氣則灑灑振寒或伸欠顏黑土勝水也或惡見入或惡見火胃實則熱熱則惡火或聞木臂則驚土惡木邪故驚或心欲動而喜閉戶塞牖獨處甚則欲上高而歌棄衣而走陽盛則四肢實實則能登高也或腹脹腸嗚火盛與水相激故激搏有聲也或詈罵不避親疏上熱鬱蒸於心胸故神明亂也邪乾血則間日發瘧而不渴或濕淫或陰痿或足廢沖督帶三脈皆聚陽明而陽明主潤宗筋宗筋主束骨而利機關也或汗出鼻衄或唇攢聚舌難言甚則不能言或面腫齒痛惡冷飲或口咼口不正也唇腫或面痛唇痛或頸腫喉痹不能言與手陽明能言者別或腹大水腫或膝腹腫痛或膺窗穴乳中穴氣衝穴股骭外廉足附土皆痛或食指不用或腹肉脹胃脘當臍痛或兩脅隔塞不通飲食不下如胃中不和則不能正偃腹嗚身重難行若胃熱則宗氣喘急胃之大絡由虛里出左乳下其動應衣宗氣泄也氣有餘則身以前皆熱善飢消穀小便色黃此陽明實熱也氣不足則身以前皆寒栗如胃中寒則脹滿此陽明虛寒也補藥白朮蓮子芡實陳皮扁豆黃耆山藥半夏百合蒼朮瀉藥大黃枳實朴硝溫藥藿香丁香木香吳茱萸草豆蔻厚朴良薑乾薑生薑肉豆蔻白豆香附益智仁胡椒涼藥元明粉黃連石膏葛根連翹滑石天花粉黃芩石斛升麻山梔竹茹知母引經藥升麻白芷葛根石膏脾足太陰之脈邪在氣則病舌本強食則嘔脾氣暖則食易消寒則不能化物故嘔嘔者有聲有物他或胃院痛腹脹善餲陰盛則氣滯故食敗氣逆人也餲於戒切音得屁則快然如衰氣下泄則腹鬆動但覺倦怠耳身體沈重邪在血則病舌痛或煩心心下急痛或寒瘧症癲或大便溏泄或水閉黃疸不能臥水氣逆滿則傷氣也或善飢善味或陰痿足不收行善戾曲也強立股膝腫大指不用寒甚則厥腹響便溲難心痛引背不得息氣有餘則腹脹小便不利身盡痛氣不足則四肢不用五藏安安百節皆縱腹大腸嗚餐泄面黃不嗜食食則不化怠惰嗜臥九竅不通身體不能動搖當臍上下左右動氣氣絶則脈不營肌肉舌萎人中滿唇反脾屬土病則色黃好歌喜甘流涎多思多疑所主者肌肉所藏者意智所惡者濕上應於唇口外應於四肢黃而肥盛胃中有痰濕也黃而枯癯胃中有火也黃而色淡胃氣虛也黃而色黯津液久耗也黃為中央土色其虛實寒熱之機當以飲食便溺消息之也補藥人參白朮蒼朮甘草芡實黃耆山藥陳皮蓮子扁豆瀉藥枳實青皮石膏溫藥丁香藿香胡椒吳茱萸附子官桂良薑涼藥石膏元明粉引經藥升麻白芍心手少陰之脈附脊第五稚邪在氣則病嗌乾心痛渴而欲飲心火炎則液耗故渴而欲飲也或善笑善忘或眩僕煩心或善驚不寐邪在血則病目黃或膺背肩脅滿痛或肩胛臂內後廉痛成厥或掌中熱而腕之劣切義闕出難經或浸淫瘡瘍或舌乾焦口苦或消渴舌破或心胸間汗氣有餘則笑不休氣不足則悲或胸腹大脅下與腰相引而痛氣絶則脈不通血不流髦色不澤而黑如漆心屬火病則色赤好言喜苦出汗多笑所主者血脈所藏者神所惡者熱上應於舌並神色外應於掌赤而䐃巨阻切音窘脂聚之貌也堅營血之充也深赤色堅素稟多火也微赤而鮮氣虛有火也赤而索澤血虛火旺也赤為火炎之色只慮津枯血竭亦無虛寒之患大抵火形之人從未有肥盛多濕者即有痰嗽亦燥氣耳補藥棗仁遠志麥門冬山藥常歸天竺黃瀉藥貝母元胡索木香黃連溫藥丁香石菖蒲涼藥竹葉牛黃硃砂連翹犀角引經藥獨活細辛小腸手太陽之脈下口即大腸上口也邪干氣則嗌痛頷腫頸測痛不可以顧肩似拔肩胛似折邪於血則耳聾目黃或頰腫鼻衄滴而不流或頸頷肩胛肘臂外後廉皆痛氣不足則小腹控陰丸引腰脊上衝心而痛稱藥牡蠣粉叉石斛瀉藥荔枝核紫蘇細木通蔥白溫藥小茴香鳥藥大茴香涼藥天花粉黃芩引經藥藁本羌活黃柏膀胱足太陽之脈上系小腸下聯前陰邪於氣則頭痛目似脫項後痛不可俯仰或脊痛腰似折或股不可以曲膕加結踹如裂膕古伯切曲腳中也踹而兗切足跟也邪乾血虛則痔盛則瘧或狂或癲狂者發作剛暴詈罵不避親疏甚則登高而歌棄衣而走逾垣上屋癲者或笑或位如醉如夢言語無序穢潔不知或頭囟項痛或目黃淚出或鼻塞流血或小腹偏腫而痛以手按之欲小便而不得胞痹小腹按之內痛若沃以湯澀於小便上為清涕膀胱不利為癃不杓為遣尿項背腰尻膕踹腳皆痛小指不用補藥石菖蒲龍骨續斷益智仁橘核瀉藥管硝白澤瀉滑石車前子溫藥茴香鳥藥涼藥生地黃黃柏草草稍引經藥藁本羌活黃柏腎足少陰之脈附脊第十四椎俞門穴之左右典前臍神闕穴平直相對左者直上入肺而循喉挾舌右者直行臍腹而上絡於心包邪在氣則病飢不欲食陰火上乘雖飢不欲食也面如黑漆腎水枯也或效唾則有血真險虧損而延及其母也或喝喝於介切嘶聲也而喘腎水不能上通於肺故也或口乾咯血坐立不安陰虛陽擾不能靜也或目䀮䀮呼光切不明也如無所見腎虛則瞳神昏眩瞳神者骨之精也或心如懸若飢狀心臂不交則精神離散故心如懸陰虛則內餒故常若飢狀也邪在血則病耳嗚或道泄口熱舌乾咽腫上氣隘干而痛厥氣走而不能言手足清大便自利口熱如膠或煩心心痛引腰脊欲得嘔或黃疸額黑或腸僻寒則利清穀熱則便膿血蓋腎開竅於二陰也或脊痛或股內後廉痛痿厥嗜臥泄利下重足下熱痛小腹急痛腰下冷痛或自言腹脹滿而實不滿或脛腫煩擾冤熱或骨痿不能起俠脅兩旁虛耎處清即䏚中季脅下也或指青黑意不樂四肢不收身重寢則汗出惡風氣不足則善恐心惕惕如人將捕之腎藏精傷則陽氣虛衰故善恐氣絶肌肉耎郤退也齒長面垢發無澤腎屬水病則色黑好呻喜咸多唾多恐多驚所主者骨所藏者精與志所惡者寒上應於耳發外應於腰背黑而肥澤骨髓之充也黑而瘦削陰火內戕也蒼黑為下焦氣旺雖犯客寒亦必蘊為邪熱絶無虛寒之候也補藥芡實龍骨龜版瑣陽牡蠣桑螵蛸地黃虎骨杜仲山藥牛膝枸杞子五味子山茱萸瀉藥澤瀉知母溫藥附子鹿茸補骨脂肉桂沈香膃肭臍涼藥黃柏牡丹皮知母地骨皮引經藥獨活肉桂心包絡手厥陰之脈男子右尺半表半裡其表即三焦里即命門也女子以左尺為心包絡與男子脈不同惟此耳邪干氣則手心熱臂肘攣急腋腫甚則胸脅支滿心中憺憺從濫切動也大動面赤目黃喜笑不休邪乾血則煩心或心痛引腋脅而欲得效掌中熱心系有二一則上與肺通為心包絡之系一則下絡小腸為周身血脈之總司凡諸邪之在心者皆心包絡受之蓋心為君主莫敢犯之也心包絡諸脈雖屬於心而行太陰肺部而脈之運動皆由包絡之火也主治俱見手少陰三焦手少陽之一上焦如霧在心下下鬲居胃上口主納而不出也鬲盲也在心脾之間也塞也管上下使氣典谷不相亂也中焦如漏在胃中脘不上不下主腐熱水穀者也胃之受水穀者曰脘臍上五寸為上脘臍上四寸即胃之幕為中脘臍上二寸當胃下口為下脘也下焦如瀆在膀胱上口主出而不納以傳道也三焦有象無質即上中下三部藏府空處是也乃水穀之道路氣之所終始也邪干氣則耳聾渾渾焞焞而痛或嗌腫喉痹三焦之氣通於喉喉不和則痹腫矣往來寒熱邪乾血則汗出或目鋭眥皆痛或頰痛耳嗚頸頷肩胛肘臂外皆痛小指次指無名指也不用或腹氣滿小腹堅不得小便溢則水留即為脹補藥黃耆益智仁甘草瀉藥澤瀉溫藥附子涼藥煆石膏地骨皮引經藥柴胡川芎青皮膽足少陽之脈在肝之短葉間邪干氣則口苦膽病則液泄故口苦或嘔宿汁善太息膽鬱則氣不舒故善太息或驚惕心下憺憺恐人將捕之寒涎漬沃致然或嗌中介介然數唾或心脅痛不能轉側足少陽之別貫心循脅病則不能轉側或耳無所聞甚則面色枯稿體無膏澤或足外反熱是為陽厥邪乾血則頭角領痛目鋭眥痛或缺盆中腫痛腋下腫或馬刀挾瘻肉色不變為肉瘦筋脈現露為筋瘻筋脈交絡為血癭憂惱消長為氣癭堅硬不移為心癭也或汗出振寒瘧膽居表裡之半陰勝則振寒陽勝則汗出故瘧或胸脅膝脛踝前諸節皆痛小指次指不用氣絶則耳聾百節盡縱目系絶補藥龍膽草木通瀉藥青皮柴胡溫藥半夏生薑陳皮川芎涼藥黃連竹茹引經藥川穹柴胡青皮肝足厥陰之脈附脊第九椎左三葉右四葉邪在氣則病閉目不欲見人腰痛痛上覺熱不可以俯仰丈夫㿗疝陰器連少腹急痛也婦人少腹腫甚則咽乾面塵脫色淅淅時寒熱兩脅下痛引少腹上下無常處或淋溲便難或脅痛支滿手足青而青唇黑邪在血則病胸滿嘔逆作酸或餐泄或狐疝臥則入腹立則出腹或遺尿或癃閉或頰腫喉痹吐濃血或吐血下血暴湧不止或瘛瘲惡風或渾身痠麻疼痛四肢滿悶筋痿不能起立或陰縮兩筋急或轉筋足逆冷或脛酸陰癢氣有餘則善怒忽忽或眩冒而巔頂痛氣逆則頭痛耳聾目赤腫痛氣不足則目無所見耳無所聞善恐加入將捕之肝虛則神魂不寧故善恐氣絶則筋急引舌與卵唇青肝屬木病剛色蒼青也好呼喜酸多泣多怒所主者筋所藏者血與醜所惡者風上應於眼外應於瓜甲蒼者而理粗筋骨勞勩也蒼而枯稿營血之涸也補藥木瓜薏苡仁阿膠酸棗仁瀉藥青皮柴胡芍藥青黛溫藥木香吳茱萸肉桂涼藥甘菊花龍膽草車前子胡黃連引經藥川芎柴胡青皮奇經八脈督脈起於下極之俞音輸並於脊裡上至風府頂中央之脈督脈也名曰風麻八屬於腦陽脈之海也下極前後兩陰之間也病則少腹上衝心而痛不得前後為沖疝氣上衝心二便不遍他其女子不孕癃痔遺尿嗌乾猝口噤背反張瘛瘲腰背強痛不得俯仰脊強反折及痛頭重不舉大人癲疾小兒風癇其脈直上直下而中央浮或尺寸俱強直而浮者督脈也任脈起於中極之下以上毛際循腹裡上開元至咽喉上頤循麵人目絡舌陰脈之海也中極臍下四寸也病則少腹繞臍引陰中切痛入房太過沖督任受傷多此也男子內結七疝女子帶下瘕聚月事不以時下腹皮急腹中有氣如指上搶心不得俯仰拘急志欲不遂陰火上乘故也其脈橫寸口邊丸丸緊細而長或弦出寸口上魚際而丸滑者任脈也衝脈起於少腹之內胞中為血之海又為諸脈經絡之海也病則逆氣裡急氣上衝咽喉不得息喘息有音不得臥腹中刺痛拘急寒氣客於衝脈則脈不通故喘動應手有寒痛痛則上引胸中也其脈直上直下而中央牢者衝脈也凡人兩手脈浮之俱有陽沈之俱有陰陰陽皆盛此沖督之脈也沖主沈牢督主浮革沖督為十二經之道路沖督用事則十二經不復朝於寸口其人恍惚癡狂陽維起於諸陽之會諸陽皆會於頭主持衛氣也病則寒熱陽維為病在表故苦寒熱而足太陽少陽始終聯附故二經為病皆寒熱腰痛痛上怫然腫又腰痛不可以咳咳則筋縮肌肉痹癢皮膚痛下部不仁汗出而寒羊癇倒僕多發於日手足相引甚者不能言若陽維不能維於陽則溶溶緩縱貌也不能自收持其脈從尺外斜上至寸而浮者陽維也陰維起於諸陰之交諸陰皆交於胸主持營血也病則心痛陰維為病在裡故苦心痛陰維雖交三陰實與任脈同歸故心痛腹痛多屬小陰而兼陰維任脈他脅滿腰痛甚則悲以恐癲疾失音多發於夜肌肉痹癢汗出惡風身灑灑然若陰維不能維於陰則悵然矢志其脈從尺內斜上至寸而沈實陰維也陽蹻苦交切起於跟內病則緩縱不收陰緩而陽急陽蹻脈急當從外踝以上急內踝以上緩腰背痛羊癇倒僕多發於日惡風偏枯𤸷五還切手足麻木也痹體強目開不得合其脈寸口左右彈浮而細綿綿者陽蹻也陰蹻起於然谷之後然谷在足內踝前起大骨下之陷中病則拘急不弛陽緩而陰急陰蹻脈急當從內踝以上急外踝以上緩少腹痛裡急腰痛相引陰中男子陰疝女子漏下不止癲疾寒熱多發於夜皮膚濕痹瘋痙瘛瘲目閉不能開其脈尺內左右彈沈而細綿綿者陰蹻也帶脈起一起脅即䏚中也在京門穴之下圍身一周如束帶然沖督任三脈同起而異行一源而三歧皆絡於帶脈病則腹滿腰溶溶若坐水中腰腹縱如囊水狀婦人腰痛少腹痛裡急愈瘲牽季脅工空耎處月事不調赤白帶下其脈中部即兩關坐左右彈而橫滑者帶脈也跌陽少陰脈説跌陽一名衝陽在腳背上去陷量二寸脈動處乃足陽明胃經之動脈也少陰一名太溪在足之內踝後跟骨上脈動處乃足少陰腎經之動脈也此乃古診法不行久矣設有危急之病寸口脈不見者診此以決死生可也若在平時總不如以關脈為胃氣以尺脈為根之為愈也上焦營衛之所司不能偏於輕重故言寸口兩關主乎中焦脾胃之所司宜重在右故言跌陽兩尺主乎下焦宜重在在故言少
