body:
  text: 卷四方祖桂枝湯治風傷衛氣脈浮緩發熱自汗營衛不和桂枝三錢白芍三錢甘草炙二錢生薑五片大棗四枚擘右五味水煎溫服啜熱稀粥一盞以助藥力覆暖取微汗效不汗少頃再服麻黃湯治寒傷營氣脈浮發熱無汗而喘骨節痛麻黃三錢去節桂枝三錢甘草炙一錢杏仁二十枚泡去皮尖右四味水煎溫服暖覆取微汗不須啜粥以寒邪入傷營氣營氣起於中焦恐穀氣反助邪熱也續命湯治中風痱身體不能自收並治但伏不得臥效逆上氣面目浮腫麻黃三錢桂枝三錢甘草炙三錢當歸三錢人參三錢石膏三錢乾薑三錢芎藭一錢杏仁三十枚泡去皮尖碎右九味水煎溫服常薄覆脊憑几坐汗出則愈不汗更服無所禁勿當風升麻湯治陽明經邪發熱及痘疹初起升麻一錢葛根錢半白芍錢半甘草炙八分右肆味水煎溫服升葛為陽明經之嚮導陽明專主肌肉恐開泄大過即以白芍斂護營血甘草調和中氣所以解利本經邪熱及時行痘膠皆為專藥然在起脹後禁用石頑小柴胡湯治少陽受邪往來寒熱脈弦脅痛而嘔柴胡三錢黃芩六錢人參一錢甘草炙一錢半夏二錢生薑五片大棗四枚擘水煎去滓溫服治傷寒有五法曰汗曰吐曰下曰溫曰和皆一定之法而少陽例中小柴胡湯專一和解表裡少陽為陰陽交界邪傳至此已漸向里故用柴胡升發其邪使從外解即以人參擋截於中不令內犯更以半夏黃芩清解在裡之熱痰生薑大棗並祛在表之邪氣又須甘草協輔參柴共襄匡正辟邪之功真不易之法無容擬議者也其方後加減乃法中之法定而不移至於邪氣犯本膽府受病而加龍骨牡蠣丸藥誤下而加芒硝屢下不解引邪人里心下急鬱郁微煩而用大柴胡為法外之法變通無定不可恩議者也獨怪世醫用小柴胡一概除夫人參且必加枳桔耗氣之品此非法之法習俗相承匿於橫議者也何怪乎道藝日卑風斯日下哉石頑星香湯治中風痰涎潮塞不省人事服熱不得者南星三錢木香五分生薑十片水煎服無時朮附湯治寒濕體痛自汗身寒白朮一兩附子五錢右二味水煎去滓放涼分三服四逆湯治陰寒脈沈四肢厥冷嘔吐泄瀉附子一枚生用乾姜五錢甘草六錢右三味水煎服分溫再服理中湯治胸痹心胸痞氣霍亂灶瀉不渴一切脾胃虛寒嘔吐清水飲食不入完穀不化乾薑炮五分人參一錢白朮炒焦一錢甘草炙五分右四味水煎去滓溫服腸胃虛脫完穀不化者煉白蜜丸彈子大沸湯研和滓日三夜二服名理中丸半夏瀉心湯治心下痞滿不痛半夏五錢泡乾薑三錢炮甘草炙三錢人參三錢黃苓三錢黃連一錢大棗四枚擘右七味水煎溫分三服七氣湯治七情鬱結於中心腹絞痛服寬膈破氣藥轉劇者投此即效人參錢半甘草炙一錢肉桂一錢半夏一錢生薑七片右五味水煎空心服崔氏八味丸治腎藏真陽不足火不歸源熟地黃八兩山茱萸肉四兩乾山藥微焙四兩牡丹皮三兩白茯苓去皮三兩白澤瀉去毛三兩附子童便浸煮去皮臍切一兩肉桂去粗皮勿見火一兩右八味為未煉白蜜丸梧子大每服五七十丸空心淡鹽湯下臨臥時溫酒下以美膳壓之本方去桂附名六味丸熟地黃用縮砂蜜八錢制治腎水真陰不足根術湯治水腫心下如盤邊如旋盤根實十枚白朮二兩右二味水煎溫分三服腹中輕即常散也平胃散治胃中宿食不化藜藿人宜之厚朴去皮薑汁炒三兩陳皮泡去浮白三兩甘草炙三兩蒼朮泔浸去皮麻油拌炒黃四兩右四味為散每服五錢加生薑三片水煎溫服二陳湯治脾胃痰濕半夏薑製二錢五分茯苓錢半陳皮略去白一錢生薑三片甘草炙一錢鳥梅肉半個右六味水煎空心溫服燥痰減半夏生薑加麥門冬去心竹瀝郁痰干效去牛夏用蜜煎姜加川貝母去心火痰加黃連竹茹老痰加蛤紹海石四君子湯治胃氣虛弱飲食不思倦怠少食人參一錢白朮炒黃一錢茯苓一錢甘草炙六分右四味水煎空心溫服四物湯治營血虛熱熟地黃二錢歸身一錢白芍藥錢半川芎藭八分右四味水煎溫服肥盛多濕痰及嘔逆少宜便溏者禁用保元湯治營衛氣血不足黃耆三錢蜜酒炙人參三錢甘草炙一錢水煎空心服生脈散治熱傷肺胃虛熱喘嗽脈虛無力人參三錢麥門冬去心二錢五味子一錢水煎不時熱服二冬膏治肺胃燥熱痰澀咳嗽天門冬去心麥門冬去心右二味等分熬膏煉白蜜收不時含熱咽之桔梗湯治冬時伏邪發於少陰咽痛不瘥及風熱肺氣不清喘嗽喉中介介如梗狀肺痿肺癰初起並得服之桔梗三錢甘草二錢右二味水煎緩緩服之防己黃耆湯治風濕相搏客在皮膚關節疼痛腰巳下疼重脈浮自汗惡風防已酒洗錢半黃耆錢半白朮一錢生薑四片大棗二枚擘甘草炙八分右六味水煎熱服後當如蟲行皮中腰已下如冰後坐被上又以一被繞腰下溫令微汗差喘加麻黃冒氣不和加芍藥氣上衝加桂枝下有陳氣加細辛陳氣者久積之寒氣也梔子豉湯治汗下不解虛邪留於膈上心下結痛虛煩懊憤不得眠反覆顛倒臥起不安者梔子拾四枚擘香豉四合右二味水煎分二服溫進一服得怏吐止後服小承氣湯治少陽陽明府證承氣湯有八禁一表證未除二心下硬滿三合面赤色四平素食少或病中反能食五嘔多六脈遲七津液內竭八小便少生大黃四錢厚朴六錢枳實炙三枚初服湯當更衣不爾者盡飲之若更衣勿服之抵當湯治畜血小腹鞭滿小便自利水蛭三十枚熬黑如無以嬤鯉甲生漆塗炙代之蟲蟲三十枚去翅足熬大黃酒浸一兩桃仁三十枚去皮尖右四味水煎去滓取三升溫服一升不下再服涼膈散治溫熱時行表裡實熟及心火亢盛目赤便祕胃熱發斑大黃酒浸二兩芒硝一兩甘草炙六錢連翹一兩黃芩一兩山梔八錢薄荷七錢共為散每服四錢加竹葉十五片水煎溫日三夜二服得下熱退為度備急丸治心腹平痛如錐刺宿食冷積脹滿巴豆去皮心膜用霜一錢乾薑生二錢大黃三錢右三味為末煉自蜜丸如小豆大溫水送下二三十丸妊娠禁用伊尹三黃湯治三焦實熱煩躁便祕黃連煮黃苓酒炒大黃酒浸右三味等分麻沸湯二升漬之須臾絞去滓分溫再服麻沸湯者白水空煎鼎沸如麻也古方惟降火藥用之十棗湯治懸飲內痛脅下有水氣脈眩數芫花熬甘遂大戟泡去骨右三味等分撂篩以水一升五合先煮大棗肥者十枚擘取八合去滓內藥未強人服一錢匕羸入服半錢匕平旦溫服若下少病不除者明日更服加半錢匕得快下利後糜粥自養五苓散治傷寒表裡未解渴而小便不利白朮生二錢茯苓二錢豬苓二錢澤瀉三錢桂枝一錢右五味為散白飲和服方寸匕日三服或生料服溫覆取微似汗益元散治暑月小便不利滑石水飛六兩甘草炙六錢生四錢為散清水調服三錢發散溫病熱病加蔥白七莖香豉四臺水煎溫服老人虛人及病後傷津小便不利禁用白虎湯治熱病壯熱煩渴及中暍煩熱而渴生石膏碎八錢知母三錢甘草炙一錢粳米半合水煎溫分二服一日盡飲之此方必燥渴潮熱自汗脈洪八字全者始可用之駐車丸治陰虛下痢發熱膿血稠黏及休息痢阿膠三兩黃連炒黑兩半當歸兩半乾薑炮一兩右四味搗篩醋煮阿膠為丸梧子大每服四五十丸晝夜三服來飲下在金丸治肝經鬱熱吐酸緑青黃水川黃連六兩吳茱萸揀去閉口者取淨一兩同黃連煮乾為細末米飲糊丸梧子大每服四十丸空心白朮陳皮湯送服或用加味逍遙散作湯送大補丸治陰火亢極足脛疼熱不能久立及婦人火鬱發熱厚黃蘖鹽酒半陳米飯上蒸每蒸必攔炒黑亮加漆為度煉白蜜丸梧子大每服二錢空心醇酒下如服之不應每斤加厚肉桂一兩金液丹治陰極發躁厥冷脈伏瓜甲唇青水腫脈伏小便不通陰結畏寒便祕明淨硫黃五兩研細水飛人煬盛罐內水調赤石脂未封口鹽泥通身固濟候乾三足釘釘於地將罐故釘上慢火燒養七晝夜再加頂火用炭十斤為度候冷取出研細每末一兩用蒸餅一兩打糊為丸梧子大每服二三寸丸溫白湯送下陰極冷甚者服百丸醫學要領程鍾齡先生內傷者氣病陽痙血病陰虛傷食以及喜怒憂思悲恐驚是也外感者風寒暑濕燥火是也不內不外傷者跌打損傷五絶之類是也病有三因不外此矣變證百端不過寒熱虛實表裡陰陽八字論治法不過大小緩急奇偶復七方與夫宣通補瀉輕重滑澀燥濕十劑也外感之邪自外而入宜瀉不宜補內傷之邪自內而出宜補不宜瀉然而瀉之中有補補之中有瀉此皆治法之權衡也又有似證如火似水水似火金似木木似金及虛似實實似虛不可以不辨明乎此則病無通精矣實火者六淫之邪飲食之傷自外而入勢猶賊也可驅而不可留虛火者七情色欲勞役耗神自內而發勢猶子也可養而不可害人固不可認賊作子更不可認子作賊病機言火者什之八言者寒什之二耳驅賊火四法一日發風塞壅閉火邪內郁宜升發之如升陽散火湯之類是也二日清內熱極盛宜用寒涼如黃連解毒湯之類是也三日攻火氣鬱結大便不通法當攻下此釜底抽薪之法如承氣湯之類是也四曰制熱氣拂鬱清之不去攻之不可此本來真水有虧不能制火所謂寒之不寒是無水也當滋其腎如地黃湯之類可用也養子火四法一月達肝經氣結五郁相因當順其性而升之所謂木鬱則達之如逍遙散之類是也此以一方治木鬱而諸郁皆解也二日滋虛火上炎必滋其水所謂壯水之主以鎮陽光如六味湯之類是也三日溫勞役神疲元氣受傷陰火乘其土位經日勞者溫之又曰甘溫能除大熱加補中益氣之類是也匹日引腎氣虛寒逼其無根失守之火浮游於上當以辛熱雜於壯水藥中導之下行所謂導龍人海引火歸元加入味湯之類是也然有邪盛匹虛之時宜用攻補兼行之法或用滋水制火之法往往取效是知養子之法可惜為驅賊之方斷無以驅賊之法而為養子之理蓋養正則邪自除理之所有伐正而能保身理所必無也熱證口渴而能消水飲食喜冷煩躁尿短而赤便結脈數寒證口不渴或假渴而不能消水喜飲熱湯手足厥冷尿清長便溏脈遲實證病中無汗胸腹脹不減痛而拒按病新得稟質厚脈實而有力虛證病中多汗胸腹脹時減復如故痛而喜按按之則痛止病久稟弱脈虛而無力里證潮熟惡熱腹痛口燥舌胎黃黑脈沈表證發熱惡寒頭痛鼻塞舌上無胎脈浮陽證為熱為實為表熱邢達表陽中之陽熱邪人里陰中之陽陰證為寒為虛為裡寒邪人里陰中之陰寒邪客表陽中之陰真陽不足脈大無力四肢倦怠唇淡口和肌泠便溏飲食不化真陰不足脈數無力虛火時炎口燥唇焦內熱便結氣逆衝上病有熱證而喜熱飲者同氣相求也有寒證而喜冷飲卻不能飲者假渴之象也有熱證而大便溏瀉者挾熱下利也有寒證而大便反硬者陰結也有熱證而手足厥冷者所謂熱深厥亦深熱微厥亦微是也有寒證而反煩躁欲坐臥泥水之中者陰躁也有有汗而為實證者熱邪傳裡也有無汗而為虛證者津液不足也有惡寒而為里證者直中於寒也有惡熱口渴而為表證者溫熱之病自里達表也此乃陰陽變化之理尤不可不早辨之也治病汗和下消吐清溫補法汗者散也風寒初客於人頭痛發熱惡寒鼻塞聲重體痛者香蘇散主之重則麻黃湯其有寒熱與外感風寒似同而實異者若誣汗之則變端百出矣又有他病重而略兼外感者量於本證藥中稍加表藥可也如臍間有動氣者埋中湯去朮加衰藥熱邪入里而表未解者麻黃石膏湯或苓連葛根湯太陽證脈沈細者少陰證反發熱者麻黃附子細辛湯少陽中風柴胡湯加桂枝陽虛者補中湯加表藥陰虛者芎歸湯加表藥之類也和者順也病在半表牛里耳聾脅痛寒熱往來小柴胡湯主之蓋少陽證有三禁汗吐下是也如病邪在表未入少陽誤用柴胡謂之引賊入門變證多端若邪已入里僅用柴胡則病不解巧為藏拙誤人匪淺也凡病在少陽正氣虛者加入參口不渴大便如常者加半夏生薑口大渴大便漸結者加花粉瓜簍兼表邪者加桂枝兼里邪者加芒硝至於三陽合病閉圓則汗面垢譫語遺尿者用白虎湯和解之和之一法變化無窮知斯意者則溫熱之治癘疫之方時行痎瘧皆從此推廣之不難應手而輒效也下者攻也病邪傳入少陰經得之二三日口燥咽乾者六七日腹滿不大便者下利脈滑數不欲食按之心下硬有宿食者下利清水色純青心下痛口乾燥者目中不了了睛不筆無表證大便難者病在陽明府譫語不能食胃中有燥屎者發熱汗多煩躁口渴能消水不惡風寒反惡熱者此皆當急下之也凡應下之證痞滿燥實四者兼全可用大承氣湯痞滿而未燥實者瀉心湯痞滿兼燥而未實者小承氣湯燥實而未痞滿者調胃承氣湯太陽傷風證誤下而傳大陰以致腹痛者桂枝湯倍芍藥誤下而腹大實痛者桂枝湯加大黃邪從少陽來寒熱未除大柴胡湯結胸證項背強自胸至腹硬滿而痛手不可近者大陷胸湯丸若不按不痛者小陷胸湯寒食結胸用三白散水結胸頭汗出者小半夏加茯苓湯水停脅下痛不可忍者十棗湯結胸陰陽二證服藥罔效者活人俱用枳實理中丸鬱熱蓄甚神昏厥逆脈反滯澀有微細欲絶之象者涼膈散合解毒湯並用太陽證未罷口渴小便短澀大便如常者五苓散太陽傳本熱結膀胱其人如狂少腹硬滿而痛小便自利下焦蓄血者抵當丸如但少腹急結未至硬滿者桃仁承氣湯或用生地四物湯加酒軍傷於冷令腹痛便閉拒按者見喼丸傷於熱食者三黃枳朮丸冷熱互傷二丸酌其所傷之多寡用之實熱老痰滾痰丸水腫實證神佑丸蟲積翦紅丸血積花蕊丸或失笑丸腸癰牡丹皮散老人久病人新産婦人每多大便閉結者通幽湯或用四物湯加潤藥其有正虛邪盛羸弱之人難於措手者古人有清法潤法導法微和法先補後攻法先攻補後並行法可以斟酌取效也消者削也病成於五藏推之不移者積也病成於六府推之而移者聚也忽聚忽散者氣也痛有定處而不敬者血也得食則痛噯腐吞酸者食積也腹有塊按之而耎者痰也先足腫後及腹者水也先腹滿後及四肢者脹也痛引兩脅效而吐涎者停飲也效而胸痛吐膿腥臭者肺癰也當胃而痛嘔而吐膿者胃脘癱也當臍而痛小便加淋轉側作水聲者腸癰也憎寒壯熱飲食如當偏著一處者外癰也病人嗜食甘甜或異物飢時則痛唇之上下有白斑點者蟲也腹中如有物動而痛不可忍者蟲毒也病人咳嗽痰紅抑抑不樂畏見人喉瘁而咳劇者勞瘵生蟲也痃如弓弦筋病也癖則隱癖飲食有所偏好而成附骨之病也症則有塊可徵積之類也瘕則或有或無痞氣之類也少腹如湯沃小便澀者胞痹也痛引睪丸者疝也女人經水自行而腹塊漸大如懷子者腸覃也經水不行而腹塊漸大並非妊身其脈澀者石瘕也至於濕熱下墜則為陰菌陰蝕陰挺下脫陰莖腫爛之類其虛火內爍庚金則為痔瘻懸疽藏毒種種見證不一而足務在詳稽博考辨明證候按法而消之慎弗視為泛常也吐者出也病在上焦胸次咽喉之地或有痰食癰膿法當吐之經所謂高畫而越之是已病人脈滑大胸膈停痰飲以二陳湯用指探喉而出之胃脘積食瓜蒂散奧橘紅淡鹽湯主之其體質虛弱者以桔梗煎湯代之寒痰閉塞厥逆昏沈者用半夏橘紅各八錢濃煎半杯和薑汁半杯頻頻灌之風邪中藏張目痰鳴聲如屯鋸便尿自遺勢將脫者參附姜夏濃煎灌之隨吐隨灌久之藥力下咽胸膈流通頻進參附可期平復風痰熱閉者以牛黃丸灌吐之頸疽內攻者以蘇合香丸灌吐之風熱不語者以解語丹灌吐之中暑不醒者以消暑丸灌吐之中惡不醒者以薑汁橘夏灌吐之夢膨不醒者以連須蔥白煎酒灌吐之自縊不醒者以肉桂煎湯灌吐之纏喉鎖喉喉閉喉風以杜牛膝搗汁和雄黃丸灌吐之牙關緊急閉塞不通者吹以搐鼻散取嚏俟牙開或痰或食照前法用二陳湯瓜蒂散分主之妊婦轉脖小便不通者補中益氣湯隨服而探吐之醋蒜吐蛇雄黃狗油同瓜蒂吐蟲韭汁吐瘀血昔仲景治胸痛不能食按之反有涎唾下利日數十行吐之則利止是以吐痰止利也由此觀之證在危疑之際古人恆以湧劑盡其神化不測之用者莫可指數矣吐法安可以不講耶至於病勢危篤老弱氣衰體質尫羸脈息虛弱房勞不慎四肢厥冷自吐不止冷汗自出諸亡血家新産婦人以及病系邪氣胸膈本無痰食者則湧吐又在所切禁也清者清也六淫之邪除中寒寒濕外皆不免於病熱經云熱者寒之是己熱氣熏蒸或見於口舌唇齒或見於口渴便尿灼知其熱而不清則斑黃狂亂厥逆吐衄諸證業生矣其勞力辛苦之人中氣大虛發熱倦怠心煩尿赤名曰虛火與外感熱證相隔霄壤又有陰虛勞瘵之證日哺潮熱者産後血虛發熱煩躁者命門火衰浮陽上汛者與夫陰盛格陽假熱之證其人面赤狂躁欲坐臥泥水中或大便數日不下或舌黑而潤或脈反洪大崢崢鼓指按之豁然空者或口渴欲得冷飲而不能咽者或因下元虛冷頻飲熱湯以自救者若誤投涼藥立見危亡矣至於風寒閉火者散而清之暑熱傷氣者補而清之濕熱者或散或滲或下而清之燥熱者潤而清之傷食積熱消而清之傷寒邪傳胃府熱勢如蒸自汗口渴飲冷而能消水者非白虎湯鮮克有濟也更有陽盛拒陰之證清藥到口即吐者以薑汁製黃連反取之所謂寒因熱用也若夫七情氣結互相感觸火從內發者以越鞠丸開六郁以逍遙散調肝氣氣虛者補其氣血虛者滋其血真陰不足而火上炎者壯水為主用六味湯真陽不足而火上炎者引火歸原用保元湯或八味丸蓋外感之火以涼為清內傷乙火以補為清也若本體素虧藏府本寒飲食素少腸胃虛滑或産後病後房勞之後雖有熱證亦只宜少少用之即有不及猶可再清儻清之太過則必寒生而將醫藥矣兒熱病清之而不去者當滋其腎腎水乃天真之水以之制外邪何邪不服何熱不除而況以治內傷乎然滋陰之藥不能開胃扶脾恢復元氣則參苓耆朮亦當酌量而用之也一溫者暖也藏府受寒必須溫劑經云寒者溫之是己天地肅殺之氣莫甚於寒其邪自表而入有曰傷寒初時即行溫散則病自除若不由表入而直中陰經者曰中寒其證惡寒厥逆口鼻氣冷或冷汗自出嘔吐瀉利或腹中急痛厥逆無脈下利清穀或寒濕浸淫四肢拘急發為痛痹此皆法當溫之者也如冬令傷寒則溫而散之冬令傷風則溫而解之寒痰壅閉則溫而開之冷食所傷則溫而消之至若中寒暴痛大便反硬溫藥不止者則以熱劑下之時當暑月納涼飲冷暴受寒侵者亦當溫之體虛挾寒者溫而補之寒客中焦主以理中湯寒客下焦主以四逆湯真虛挾寒命門火衰者必須補其真陽復有陰盛格陽之證混藥不效力則以白湯加入尿豬膽汁反取之所謂熱因寒用也更有表裡肯寒之證始用溫藥裡寒頓除表邪未散復傳經絡以致始為寒中而後變為熱中者容或有之亦有三陰直中和無表邪溫藥太過遂令塞退熱生初終異轍在所時有若不斟酌時宜對證投劑是先以溫藥救之者繼以溫藥賊之矣夫以陽氣素虛之人一旦客寒乘之則溫劑宜重若人人平日火旺不任辛溫成曾有陰虧失血之證不能用溫藥者即中新寒亦須景減不必盡劑也且溫之與補有相兼者有不必相兼者虛而目寒則兼用之寒而不虛則專以薑桂主之時當盛夏雖溫劑宜輕若虛寒極重亦當舍時而從證然桂枝下咽陽盛則斃承氣入胃陰盛則亡安危之機禍如反掌苟非審慎明辨奚克悉底中和哉補者助也邪之所湊且氣必虛虛者損之漸損者虛之積也初時不覺久則病成雖欲補之將何及耶大虛之證外似有餘內實不足脈浮大而澀面赤火炎身浮頭眩煩躁不安此為比汗暈脫之機更有精神浮散徹夜不寐者其禍尤速宜急用養榮湯歸脾湯加斂藥以收攝元神庶幾可救復有陰虛火亢氣逆上衝不得眠者法當滋水切忌苦寒至其人本體雖虛而客邪勢正方張若驟補上無異閉門留寇更有大實之證積熱在中酷肯虛寒者必唇焦口燥便閉尿赤與真虛相隔天淵誤投補劑病必增劇矣補氣藥用四君子湯有補火清火之別蓋少火為生氣之原丹田乃出氣之海補氣不補火者非也然而壯火食氣如傷暑之人四肢無力濕熱成痿不能舉動者又當清以為補也補血藥用四物湯亦有寒熱之異血熱之證宜補宜行而兼清血寒之證宜溫宜養而兼和如熱迫血而妄行謂之陽乘陰治用四生丸六味湯若血寒而吐謂之陰乘陽治用理中湯加當歸其有去血過多成升斗者無分寒熱皆當補益所謂血脫者益其氣乃陽生陰長之至理蓋有形之血不能速生無形之氣所當急固也然補之之法有開闔緩急如補中益氣湯用參耆必用陳皮以開之六味湯用熟地即用澤瀉以導之有補散並行者參蘇飲益氣湯是也有消補並行者枳朮丸理中丸是也有攻補並行者瀉心湯硝石丸是也有溫補並行者治中湯參附湯是也有清補並行者參連飲人參白虎湯是也更有極虛之人垂危之病非大劑湯液不能挽回者當用參附煎膏日服數兩以救陽微將脫之證並用參麥煎膏日服數兩以拯津液將枯之證無力者代之以耆朮儻病邪未盡元氣雖虛不任峻補則從容和緩相其機宜循序漸進其有體質素虛別無大寒大熱者則用平和之藥調理氣血可也難經所云損其肺者益其氣損其心者和其營衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精此正補也又肺虛者補土心虛者補木脾虛者補命門火肝虛者補水腎虛者補金此相生而補之也至於腎者先天之根本也有水有火水曰真陰火曰真陽非氣非血生身生命全賴乎此古人月六味滋水八味補火以十全大補湯兼濟水火法非不善矣然以假補真必其真者未經盡喪庶幾有效若先天之氣蕩然無存雖有靈芝亦難續命而況庶草乎至於脾者後天之根本也尤當培養不可忽視所謂安穀則昌絶谷則危又云粥漿入胃則虛者活古人制補中益氣湯歸脾湯健脾丸者良有以也然因餓致病者固多而因傷致病者亦復不少過嗜肥甘則痰生過嗜醇釀則飲積瓜果乳酥濕從內受發為腫滿瀉利五味偏啖久而增氣皆令天殃可不慎哉是知脾腎二藏皆為根本不可偏廢古人或謂補脾不如補腎者以命門之火可生脾土也或謂補腎不如補脾者以飲食之精自能下注於腎也凡脾弱而腎不虛者則補脾為亟腎弱而脾不虛者補腎為先若脾腎兩虛則並補之但藥補不如食補食補不如精補精補不如神補節飲食慎風寒惜精神用藥得宜病有不痊焉者寡矣現有人參果專治五勞七傷諸虛百損並能御外邪消飲食輕易不老郤病延年真神丹妙藥人人皆有惟不肯服食耳雜録吳草廬曰脈行始於肺終於肝而復會於肺肺為出氣之門戶故名氣口而為六脈之大會以占身焉李瀕湖曰兩手六部皆肺之經脈待取此以候五藏六府之氣非五藏六府所居之處也張石頑曰靈樞經脈雖各有起止各有支別而實一氣相通故特藉手太陰一經之動脈以候五藏六府十二經之有餘不足其經雖屬於肺實皆胃氣所主蓋藏冊諸氣靡不本之於胃也觀五藏別論經脈別論營衛生會三假經文可以默識其微矣李士材曰夫人之虛非氣即血脾為肺母肺為氣生之官故肺氣受傷者必求助於脾土也腎為肝母肝為藏血之地故肝血受傷者必藉資於腎水也補腎補脾法當並行然甘寒補腎恐妨胃氣辛溫扶脾恐耗腎水須辨緩急而為之施治或補腎而助以沈香砂仁或扶脾而雜以山藥五味機用不可不活也古於醫曰三折肱曰九折臂甚哉醫道之難也海內方書奚啻汗牛充棟是非抵牾靡所適從而鹵莽子掠其淺膚輒輕試方往往不刃而殺人誠可惻然況小兒痘科更有難之又難者先外大父小珊吳公博學多材藝聚精軒岐嘗著醫學輯要一書發前賢之奧室指後學之迷津體症切而施藥當實為濟世之寶筏梓州方匯枝分轉會為刊布年久不知版之存毀叔兄默云氏藏有原本巳擬重付剞劂以廣流傳咸豐甲寅賊竄江香亦遂矢余曩於燼餘撿拾輯要四卷雖間缺如復得他本補録之又檢得方分轉重刊天花精言三卷惜非全豹惟大要已備每以活嬰應輒如響亟並梓行今於通州續獲精言完本乃知為烙陽袁大宣先生所編先外大父客分署時所校讎也鳴呼紅羊浩劫往籍灰飛此書輾轉全存殆天之留以保赤子歟爰取全本重校補刊又有武進莊在田先生著福幼遂生兩編伯兄怕駒氏會記述刊行以及羅浮陳飛霞先生幼幼集成皆保嬰良方合付手民裝成四冊卷帙不繁便於觀覽或可作救生之一助云爾同治十三年甲戍猜和月鑑湖陳季平氏跋
