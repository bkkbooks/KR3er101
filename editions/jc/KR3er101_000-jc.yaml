front:
  text: 序醫學至廣其歸不外望聞問切而已雖然四字之用世俗類能言四字之功宿學不能盡經曰上工望而知中工問而知下工脈而知嗟乎脈亦豈易易哉不知有脈何論望聞古之名醫緩視晉候疾在膏肓醫和視晉候疾如蠱扁鵲視病盡見五臟癥結而診脈特姑存其名其兄治病視神於未診而除之此真望而知之者血苟非其人姑思其次切脈或庶幾乎夫切脈之難久矣靜氣平心調鼻息之呼吸定脈至之遲數而因察其為浮為沈為滑為澀緊緩虛實之辯小大長短之分芤伏洪耎微弱動牢之殊塗促結代散疾細清濁之異候或如弦如溜如革或如毛如石如鉤乃周知其受病之所由故藏府經絡喻於不言督帶任沖審於無象此可望而知聞而知問而知乎況兒科婦科之棘手恆數倍於常人者乎今之以醫鳴者大部長於問者也人言寒即以寒治之人言熱即以熱治之其於脈也殆不啻如扁鵲之姑以診為名也取書一帙顧病者上其手斂三指經略按之態甚舒心甚暇也仍與主人縱談或寒暄或瑣事異聞不數語復顧病者下其手診如前畢不律一揮一紙飛下則脈案藥品具他一揖而退降趨而出異哉其聰明才智真會伯於古人歟抑古人望而知之言專為今之名醫者設歟先外祖小珊吳公博涉經史旁通醫學慮汎試者罔知取材簡陋者囿於膚受也著輯要四卷精采名論加以折衷且論形質神色看證諸則望而知之之法也其論聲氣諸則聞而知之之法也惟於切脈猶詳明而深究之以是知公之不與世為浮沈也脈候既審乃可對證發藥故繼之以方祖以是知公之不以病為嘗試他綜要領以暢其旨綴雜錄以博共趣則又公之約而明簡而該也雖醫學不盡於此就果家有是編以醫行世者固可備印證之資即不業醫者亦不致迷於祈向其有益於世豈淺鮮哉梓州方匯枝分轉會刊於海陵歲久漫漶重校付梓以廣其傳不揣鄙謹敘其緣起云咸豐四年歲在關逢攝提格七月上瀚外孫陳照謹撰
